<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Přihlášení – cievny.sk nástroje</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#5b0e1a;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:#fff;border-radius:14px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.logo{font-size:22px;font-weight:700;color:#1a2745;margin-bottom:4px;}
.sub{font-size:13px;color:#6b7280;margin-bottom:32px;}
label{display:block;font-size:12px;font-weight:600;color:#5a6a8a;margin-bottom:6px;}
input[type=password]{width:100%;padding:10px 12px;border:1.5px solid #dde1ea;border-radius:8px;font-size:15px;outline:none;transition:border-color .15s;}
input[type=password]:focus{border-color:#ef4444;}
button{width:100%;margin-top:16px;padding:11px;background:#b91c1c;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;}
button:hover{background:#991b1b;}
#login-msg{min-height:20px;font-size:13px;margin-top:12px;text-align:center;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🫀 cievny.sk</div>
  <div class="sub">Klinické nástroje – přihlášení (VFN)</div>
  <label for="pw">Heslo</label>
  <input type="password" id="pw" placeholder="••••••••" autofocus onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">Přihlásit se</button>
  <div id="login-msg"></div>
</div>
<script src="/cz/tools/auth.js"></script>
</body>
</html>
