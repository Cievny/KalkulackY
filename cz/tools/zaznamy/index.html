<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Záznamy – cievny.sk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f7;min-height:100vh;color:#1a2745;}
.wrap{max-width:1200px;margin:0 auto;padding:20px;}
h1{font-size:18px;font-weight:700;}
.page-sub{font-size:13px;color:#6b7280;margin:4px 0 16px;}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:#fff;border-radius:10px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px;}
.toolbar select,.toolbar input[type=text]{padding:7px 10px;border:1.5px solid #dde1ea;border-radius:7px;font-size:13px;font-family:inherit;outline:none;}
.toolbar input[type=text]{flex:1;min-width:160px;}
.toolbar label.chk{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;cursor:pointer;}
.btn{padding:7px 12px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-reload{background:#1e40af;color:#fff;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
th,td{text-align:left;padding:9px 12px;font-size:13px;border-bottom:1px solid #eef1f6;}
th{background:#f8faff;font-weight:700;color:#374151;font-size:12px;text-transform:uppercase;letter-spacing:.3px;}
tr.row:hover{background:#f8faff;cursor:pointer;}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;}
.tag-evk{background:#dbeafe;color:#1e40af;}
.tag-cas{background:#fef3c7;color:#b45309;}
.tag-pevar{background:#dcfce7;color:#166534;}
.st-ok{color:#16a34a;font-weight:700;}
.st-miss{color:#dc2626;font-weight:700;}
.empty{text-align:center;padding:30px;color:#9ca3af;font-size:14px;}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;z-index:50;}
.overlay.show{display:flex;}
.modal{background:#fff;border-radius:12px;max-width:760px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.3);}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #eef1f6;position:sticky;top:0;background:#fff;border-radius:12px 12px 0 0;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#6b7280;line-height:1;}
.modal-body{padding:16px 20px;}
.fld{margin-bottom:10px;}
.fld label{display:block;font-size:11px;font-weight:700;color:#6b7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.2px;}
.fld input,.fld textarea{width:100%;padding:7px 9px;border:1.5px solid #dde1ea;border-radius:6px;font-size:13px;font-family:inherit;outline:none;color:#1a2745;}
.fld input:focus,.fld textarea:focus{border-color:#3b82f6;}
.fld textarea{resize:vertical;min-height:38px;}
.fld.changed input,.fld.changed textarea{border-color:#f59e0b;background:#fffbeb;}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid #eef1f6;position:sticky;bottom:0;background:#fff;border-radius:0 0 12px 12px;}
.btn-save{background:#16a34a;color:#fff;}
.btn-cancel{background:#f0f2f7;color:#374151;}
.btn-del{background:#fff;color:#dc2626;border:1.5px solid #fca5a5;margin-right:auto;}
.msg{font-size:13px;font-weight:600;align-self:center;margin-right:auto;}
.sec-hdr{grid-column:1/-1;font-size:11px;font-weight:800;color:#1e40af;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px;border-top:1px solid #eef1f6;padding-top:10px;}
</style>
</head>
<body>
<script src="/cz/tools/auth.js"></script>
<script>checkAuth();</script>

<div class="wrap">
  <h1>📁 Záznamy výkonů</h1>
  <p class="page-sub">Vyhledání a dodatečná editace výkonů (např. doplnění komplikací).</p>

  <div class="toolbar">
    <select id="f_tool" onchange="render()">
      <option value="">Všechny nástroje</option>
      <option value="evk">EVK</option>
      <option value="cas">CAS</option>
      <option value="pevar">PEVAR</option>
    </select>
    <input type="text" id="f_search" placeholder="Hledat ID / operatéra..." oninput="render()">
    <label class="chk"><input type="checkbox" id="f_miss" onchange="render()"> Jen nedoplněné komplikace</label>
    <button class="btn btn-reload" onclick="loadAll()">↻ Načíst</button>
  </div>

  <table>
    <thead><tr><th>Nástroj</th><th>ID výkonu</th><th>Datum</th><th>Operatér</th><th>Komplikace</th></tr></thead>
    <tbody id="tbody"><tr><td colspan="5" class="empty">Načítám…</td></tr></tbody>
  </table>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="m_title">Záznam</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="m_body"></div>
    <div class="modal-foot">
      <button class="btn btn-del" onclick="delRecord()">🗑 Smazat</button>
      <span class="msg" id="m_msg"></span>
      <button class="btn btn-cancel" onclick="closeModal()">Zrušit</button>
      <button class="btn btn-save" onclick="saveRecord()">💾 Uložit změny</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://ncqtiicfqhaturjlfxcj.supabase.co';
const SB_KEY='sb_publishable_DX_FaXYGNx70dB6m-PfhAA_H5NHyH3k';
const SB_HEAD={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
const TABLES={evk:'cz_evk_vykony',cas:'cz_cas_vykony',pevar:'cz_pevar_vykony'};
const TOOL_LABEL={evk:'EVK',cas:'CAS',pevar:'PEVAR'};
// stĺpce, ktoré sa needitujú
const READONLY=['id','created_at'];
// stĺpce súvisiace s komplikáciami (pre status + zvýraznenie sekcie)
const COMPL_KEYS=['komplikacie','komplikacie_struct','clavien_dindo','konverzia','tech_uspech'];

let ROWS=[];
let CURRENT=null; // {tool, table, data}

function escHtml(t){return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function loadAll(){
  document.getElementById('tbody').innerHTML='<tr><td colspan="5" class="empty">Načítám…</td></tr>';
  ROWS=[];
  for(const [tool,table] of Object.entries(TABLES)){
    try{
      const r=await fetch(`${SB_URL}/rest/v1/${table}?order=created_at.desc&limit=1000`,{headers:SB_HEAD});
      if(r.ok){const arr=await r.json();arr.forEach(d=>ROWS.push({tool,table,data:d}));}
    }catch(e){/* ignore */}
  }
  // zoradiť spolu podľa created_at desc
  ROWS.sort((a,b)=>String(b.data.created_at||'').localeCompare(String(a.data.created_at||'')));
  render();
}

function hasCompl(d){
  return COMPL_KEYS.some(k=>{const v=d[k];return v!==null&&v!==undefined&&v!==''&&v!==false;});
}

function render(){
  const ft=document.getElementById('f_tool').value;
  const fs=document.getElementById('f_search').value.trim().toLowerCase();
  const fm=document.getElementById('f_miss').checked;
  const rows=ROWS.filter(r=>{
    if(ft&&r.tool!==ft)return false;
    if(fm&&hasCompl(r.data))return false;
    if(fs){
      const hay=((r.data.vykon_id||'')+' '+(r.data.operator||'')).toLowerCase();
      if(!hay.includes(fs))return false;
    }
    return true;
  });
  const tb=document.getElementById('tbody');
  if(!rows.length){tb.innerHTML='<tr><td colspan="5" class="empty">Žádné záznamy.</td></tr>';return;}
  tb.innerHTML='';
  rows.forEach((r,i)=>{
    const d=r.data;
    const datum=d.datum||d.datum_zaznamu||(d.created_at?d.created_at.slice(0,10):'');
    const ok=hasCompl(d);
    const tr=document.createElement('tr');
    tr.className='row';
    tr.onclick=()=>openModal(r);
    tr.innerHTML=`<td><span class="tag tag-${r.tool}">${TOOL_LABEL[r.tool]}</span></td>
      <td>${escHtml(d.vykon_id||'—')}</td>
      <td>${escHtml(datum)}</td>
      <td>${escHtml(d.operator||'—')}</td>
      <td>${ok?'<span class="st-ok">✅ doplněno</span>':'<span class="st-miss">⚠️ chybí</span>'}</td>`;
    tb.appendChild(tr);
  });
}

function openModal(r){
  CURRENT=r;
  const d=r.data;
  document.getElementById('m_title').textContent=`${TOOL_LABEL[r.tool]} · ${d.vykon_id||d.id.slice(0,8)}`;
  const body=document.getElementById('m_body');
  body.innerHTML='';
  document.getElementById('m_msg').textContent='';
  // komplikácie sekcia hore, zvyšok dole
  const keys=Object.keys(d).filter(k=>!READONLY.includes(k));
  const complFirst=keys.filter(k=>COMPL_KEYS.includes(k));
  const rest=keys.filter(k=>!COMPL_KEYS.includes(k));
  const addHdr=(t)=>{const h=document.createElement('div');h.className='sec-hdr';h.textContent=t;body.appendChild(h);};
  addHdr('⚠️ Komplikace / výsledek');
  complFirst.forEach(k=>body.appendChild(fldEl(k,d[k])));
  addHdr('Ostatní pole záznamu');
  rest.forEach(k=>body.appendChild(fldEl(k,d[k])));
  document.getElementById('overlay').classList.add('show');
}

function fldEl(key,val){
  const wrap=document.createElement('div');
  wrap.className='fld';wrap.dataset.key=key;
  const long=typeof val==='string'&&(val.length>60||val.includes('\n')||val.startsWith('{')||val.startsWith('['));
  const inputHtml=long
    ?`<textarea data-orig="${escHtml(val)}">${escHtml(val)}</textarea>`
    :`<input type="text" data-orig="${escHtml(val)}" value="${escHtml(val)}">`;
  wrap.innerHTML=`<label>${escHtml(key)}</label>${inputHtml}`;
  const inp=wrap.querySelector('input,textarea');
  inp.addEventListener('input',()=>{wrap.classList.toggle('changed',inp.value!==(inp.dataset.orig||''));});
  return wrap;
}

function collectChanges(){
  const changes={};
  document.querySelectorAll('#m_body .fld').forEach(wrap=>{
    const inp=wrap.querySelector('input,textarea');
    const orig=inp.dataset.orig||'';
    if(inp.value!==orig){
      let v=inp.value;
      if(v==='')v=null;                                   // prázdne → NULL
      else if(v==='true')v=true; else if(v==='false')v=false; // boolean
      changes[wrap.dataset.key]=v;
    }
  });
  return changes;
}

async function saveRecord(){
  if(!CURRENT)return;
  const changes=collectChanges();
  const keys=Object.keys(changes);
  if(!keys.length){msg('Žádné změny.','#6b7280');return;}
  msg('Ukládám…','#3b82f6');
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${CURRENT.table}?id=eq.${CURRENT.data.id}`,
      {method:'PATCH',headers:{...SB_HEAD,'Prefer':'return=minimal'},body:JSON.stringify(changes)});
    if(r.ok){
      Object.assign(CURRENT.data,changes);
      msg('✅ Uloženo ('+keys.length+' polí)','#16a34a');
      render();
      setTimeout(closeModal,800);
    }else{msg('Chyba '+r.status,'#dc2626');}
  }catch(e){msg('Chyba sítě: '+e.message,'#dc2626');}
}

async function delRecord(){
  if(!CURRENT)return;
  if(!confirm('Opravdu smazat tento záznam? Tuto akci nelze vrátit.'))return;
  msg('Mažu…','#dc2626');
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${CURRENT.table}?id=eq.${CURRENT.data.id}`,{method:'DELETE',headers:SB_HEAD});
    if(r.ok){ROWS=ROWS.filter(x=>x.data.id!==CURRENT.data.id);render();closeModal();}
    else msg('Chyba '+r.status,'#dc2626');
  }catch(e){msg('Chyba sítě: '+e.message,'#dc2626');}
}

function msg(t,c){const el=document.getElementById('m_msg');el.style.color=c;el.textContent=t;}
function closeModal(){document.getElementById('overlay').classList.remove('show');CURRENT=null;}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

loadAll();
</script>
</body>
</html>
