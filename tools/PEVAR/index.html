<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PEVAR – Generátor správ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13.5px;background:#f0f2f5;color:#1a1a2e}
.tabnav{display:flex;background:#1a2745;padding:0 16px;gap:4px;position:sticky;top:0;z-index:100}
.tnb{padding:10px 18px;background:none;border:none;color:#8fa3c8;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:.15s}
.tnb:hover{color:#fff}.tnb.active{color:#fff;border-bottom-color:#3b82f6}
.wrap{display:grid;grid-template-columns:1fr 400px;min-height:calc(100vh - 42px)}
.left{padding:18px 20px;overflow-y:auto}
.right{background:#fff;border-left:1px solid #d8dce6;padding:18px;position:sticky;top:42px;height:calc(100vh - 42px);display:flex;flex-direction:column;gap:8px}
.card{background:#fff;border-radius:10px;padding:15px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.st{font-size:11px;font-weight:700;color:#5a6a8a;text-transform:uppercase;letter-spacing:.7px;margin-bottom:11px;padding-bottom:6px;border-bottom:2px solid #eef0f5}
.f{margin-bottom:9px}
.f label{display:block;font-size:11.5px;color:#5a6a8a;font-weight:600;margin-bottom:3px}
input[type=text],input[type=number],select,textarea{width:100%;padding:6px 9px;border:1.5px solid #dde1ea;border-radius:6px;font-size:13px;color:#222;background:#fff;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#3b82f6}
.row{display:grid;gap:7px;margin-bottom:9px}
.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}
.checks{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:3px}
.ck{display:flex;align-items:center;gap:5px;font-size:12.5px;cursor:pointer;user-select:none;padding:2px 0}
.ck input{width:auto;accent-color:#3b82f6;cursor:pointer}
.tog{margin-bottom:7px;border:1.5px solid #eef0f5;border-radius:7px;overflow:hidden}
.thdr{display:flex;align-items:center;gap:9px;padding:8px 11px;background:#f7f8fc;cursor:pointer;font-weight:600;font-size:13px}
.thdr input{width:auto;accent-color:#3b82f6}.thdr:hover{background:#eef3fc}
.tbody{padding:12px;display:none;border-top:1.5px solid #eef0f5}.tbody.on{display:block}
#out{flex:1;width:100%;border:1.5px solid #dde1ea;border-radius:7px;padding:12px;font-size:12px;line-height:1.65;resize:none;font-family:'Courier New',monospace;color:#1a1a2e;background:#fafbfd}
.btns{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 14px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:5px;flex:1;justify-content:center}
.bc{background:#1d6f42;color:#fff}.bc:hover{background:#155e38}
.bp{background:#1e40af;color:#fff}.bp:hover{background:#1737a0}
.bs{background:#7c3aed;color:#fff}.bs:hover{background:#6d28d9}
#cmsg{font-size:11px;text-align:center;min-height:16px}
.dyn-row{background:#f7f8fc;border:1.5px solid #eef0f5;border-radius:7px;padding:10px;margin-bottom:7px;position:relative}
.dyn-row .del-btn-x{position:absolute;top:7px;right:7px;background:none;border:none;font-size:15px;cursor:pointer;color:#aab;padding:0 3px}
.dyn-row .del-btn-x:hover{color:#e53}
.add-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;background:#eef3fc;border:1.5px dashed #3b82f6;border-radius:6px;font-size:12px;font-weight:600;color:#3b82f6;cursor:pointer;width:100%;justify-content:center;margin-top:4px}
.add-btn:hover{background:#dbeafe}
@media print{.tabnav{display:none}.left{display:none}.right{border:none;height:auto;position:static}.btns{display:none}#out{border:none;font-family:inherit;font-size:13px;background:#fff}}
</style>
</head>
<body>
<nav class="tabnav">
  <button class="tnb active">🫀 PEVAR</button>
</nav>

<div class="wrap">
<div class="left">

<!-- Pacient -->
<div class="card">
<div class="st">Pacient a Indikácia</div>
<div class="row r3">
  <div class="f"><label>Dátum</label><input type="date" id="datum_zaznamu"></div>
  <div class="f"><label>Vek</label><input type="number" id="vek" placeholder="72" min="18" max="110" oninput="gen()"></div>
  <div class="f"><label>Pohlavie</label>
    <select id="pohlavie" onchange="gen()">
      <option value="Muž">Muž</option>
      <option value="Žena">Žena</option>
    </select>
  </div>
</div>
<div class="f"><label>Diagnóza</label><input type="text" id="diagnoza" value="komplexným postihnutím infrarenálnej aorty – AAA" oninput="gen()"></div>
<div class="f"><label>Charakteristika</label>
  <div class="checks">
    <label class="ck"><input type="checkbox" id="char_krehky" onchange="gen()"><span>Krehký/á</span></label>
    <label class="ck"><input type="checkbox" id="char_polymorbidny" checked onchange="gen()"><span>Polymorbidný/á</span></label>
    <label class="ck"><input type="checkbox" id="symptomaticky" onchange="gen()"><span>Symptomatický/á</span></label>
  </div>
</div>
<div class="f"><label>Typ výkonu</label>
  <div class="checks">
    <label class="ck"><input type="radio" name="ind_typ" id="ind_elektivny" value="elektívnemu" checked onchange="gen()"><span>Elektívny</span></label>
    <label class="ck"><input type="radio" name="ind_typ" id="ind_urgentny" value="urgentnému" onchange="gen()"><span>Urgentný</span></label>
  </div>
</div>
</div>

<!-- Prístup -->
<div class="card">
<div class="st">Prístup</div>
<div class="row r2">
  <div class="f"><label>Anestézia</label>
    <select id="anestezia_typ" onchange="gen()">
      <option>V lokálnej anestézii</option>
      <option>V celkovej anestézii</option>
      <option>V spinálnej anestézii</option>
    </select>
  </div>
  <div class="f"><label>Strana prístupu</label>
    <select id="pristup_strana" onchange="gen()">
      <option value="obojstranne|l.utrq.">Obojstranne</option>
      <option value="vpravo|l.dx.">Vpravo</option>
      <option value="vľavo|l.sin.">Vľavo</option>
    </select>
  </div>
</div>
<div class="row r2">
  <div class="f"><label>Tepna</label><input type="text" id="punkcia_arteria" value="AFC" oninput="gen()"></div>
  <div class="f"><label>Technika punkcie</label><input type="text" id="punkcia_technika" value="Seldingerovou technikou, retrográdne" oninput="gen()"></div>
</div>
<div class="row r2">
  <div class="f"><label>Navigácia</label>
    <div class="checks">
      <label class="ck"><input type="checkbox" id="usg_nav" onchange="gen()"><span>USG</span></label>
      <label class="ck"><input type="checkbox" id="rtg_nav" onchange="gen()"><span>RTG</span></label>
    </div>
  </div>
  <div class="f"><label>Veľkosť sheathu</label>
    <select id="sheath_velkost" onchange="gen()">
      <option>6F</option><option>7F</option><option selected>8F</option><option>9F</option><option>10F</option>
    </select>
  </div>
</div>
<div class="f"><label>Technika zabezpečenia vpichu</label>
  <select id="zabezpecenie_technika" onchange="gen()">
    <option value="preclosure technikou">Štandardná preclosure</option>
    <option value="za použitia preclosure techniky za použitia ProStyle zariadenia">Preclosure s ProStyle</option>
    <option value="odobratím hĺbky miesta vpichu kalibračným dilatátorom pre Manta systém">Kalibrácia pre Manta</option>
  </select>
</div>
</div>

<!-- Katetrizácia a implantácia -->
<div class="card">
<div class="st">Katetrizácia a Implantácia</div>
<div class="f"><label>Katetrizácia aorty</label>
  <textarea id="katetrizacia_aorty" rows="2" oninput="gen()">Zľava zavádzame cez 8F puzdro 5F pig tail katéter do suprarenálnej aorty, sprava cez 8F puzdro Berenstein katéter do hrudnej aorty</textarea>
</div>
<div class="f"><label>Vodič</label>
  <select id="vodic_typ" onchange="gen()">
    <option>Lunderquist vodič</option>
    <option>BackUp vodič</option>
  </select>
</div>

<div class="f"><label>Typ SG tela</label>
  <div class="checks">
    <label class="ck"><input type="radio" name="sg_typ" id="sg_bifurkacny" value="bifurkačného" checked onchange="gen()"><span>Bifurkačný</span></label>
    <label class="ck"><input type="radio" name="sg_typ" id="sg_unilateralny" value="unilaterálneho" onchange="gen()"><span>Unilaterálny</span></label>
  </div>
</div>
<div class="row r2">
  <div class="f"><label>Stentgraft – názov</label>
    <select id="sg_nazov" onchange="gen()">
      <option>Endurant</option><option>Cook Alpha</option><option>ALTO</option><option>MINOS</option><option>Incraft</option>
    </select>
  </div>
  <div class="f"><label>Rozmery SG tela (mm)</label><input type="text" id="sg_rozmery" value="18-166-16" oninput="gen()"></div>
</div>

<div id="contra_section">
<div class="f"><label>Katéter kontralaterálnej nožičky</label>
  <select id="contra_kateter_typ" onchange="gen()">
    <option>Berenstein</option><option>C1</option><option>SIM</option><option>Vertebrálnym</option><option>Shepherd Hook</option>
  </select>
</div>
<div class="row r2">
  <div class="f"><label>Komponent DX – názov</label>
    <select id="komponent_dx_nazov" onchange="gen()">
      <option>Ovation</option><option>Endurant</option><option>Cook</option><option>MINOS</option><option>Incraft</option>
    </select>
  </div>
  <div class="f"><label>Komponent DX – rozmery</label><input type="text" id="komponent_dx_rozmery" value="12x120mm" oninput="gen()"></div>
</div>
<div class="row r2">
  <div class="f"><label>Komponent SIN – názov</label>
    <select id="komponent_sin_nazov" onchange="gen()">
      <option>Ovation</option><option>Endurant</option><option>Cook</option><option>MINOS</option><option>Incraft</option>
    </select>
  </div>
  <div class="f"><label>Komponent SIN – rozmery</label><input type="text" id="komponent_sin_rozmery" value="12x140mm" oninput="gen()"></div>
</div>
</div>

<!-- Extenzie -->
<div class="tog">
  <label class="thdr"><input type="checkbox" id="c_extenzie" onchange="tB('extenzie');gen()"><span>Extenzie</span></label>
  <div class="tbody" id="b_extenzie">
    <div id="extenzie_list"></div>
    <button type="button" class="add-btn" onclick="addExtenzia()">＋ Pridať extenziu</button>
  </div>
</div>

<div class="f"><label>Ďalší postup / Komplikácie</label>
  <textarea id="implantacia_komentar" rows="2" placeholder="Zadajte ďalší postup alebo komplikácie..." oninput="gen()"></textarea>
</div>
</div>

<!-- Výsledok -->
<div class="card">
<div class="st">Domodelovanie a AG výsledok</div>

<div class="tog">
  <label class="thdr"><input type="checkbox" id="modelovanie_telo" checked onchange="tB('mod_telo');gen()"><span>Domodelovanie tela SG</span></label>
  <div class="tbody on" id="b_mod_telo">
    <div class="f"><label>Balón</label>
      <select id="modelovanie_telo_balon" onchange="gen()"><option>CODA</option><option>Reliant</option></select>
    </div>
  </div>
</div>

<div class="tog">
  <label class="thdr"><input type="checkbox" id="modelovanie_extenzie" checked onchange="tB('mod_ext');gen()"><span>Domodelovanie extenzií</span></label>
  <div class="tbody on" id="b_mod_ext">
    <div class="row r2">
      <div class="f"><label>Balón</label>
        <select id="modelovanie_extenzie_balon" onchange="gen()"><option>Atlas</option><option>Metacross</option><option>Mustang</option></select>
      </div>
      <div class="f"><label>Veľkosť (mm)</label><input type="text" id="modelovanie_extenzie_rozmer" placeholder="napr. 12 a 18mm" oninput="gen()"></div>
    </div>
  </div>
</div>

<div class="tog">
  <label class="thdr"><input type="checkbox" id="endoleak_check" onchange="tB('endoleak');gen()"><span>Endoleak</span></label>
  <div class="tbody" id="b_endoleak">
    <div class="row r2">
      <div class="f"><label>Typ</label>
        <select id="endoleak_typ" onchange="gen()">
          <option value="I">Typ I</option>
          <option value="II">Typ II</option>
          <option value="III">Typ III</option>
          <option value="IV">Typ IV</option>
        </select>
      </div>
      <div class="f"><label>Zdroj (Typ II)</label>
        <select id="endoleak_typ2_zdroj" onchange="gen()">
          <option value="cestou lumbálnych tepien">Lumbálne tepny</option>
          <option value="cestou akcesórnej renálnej tepny">Akcesórna renálna tepna</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="f" style="margin-top:6px">
  <label class="ck"><input type="checkbox" id="komponenty_ok" checked onchange="gen()"><span>Všetky komponenty dobre rozvinuté, bez stenózy.</span></label>
</div>
</div>

<!-- Uzáver -->
<div class="card">
<div class="st">Uzáver miesta vpichu</div>
<div class="row r2">
  <div class="f"><label>Uzáver DX (l.dx.)</label>
    <select id="uzaver_dx_technika" onchange="gen()">
      <option value="dotiahnutím sutúr Prostyle uzatváracieho zariadenia">ProStyle sutúra</option>
      <option value="pomocou Manta systému">Manta systém</option>
      <option value="manuálnou kompresiou">Manuálna kompresia</option>
    </select>
  </div>
  <div class="f"><label>Uzáver SIN (l.sin.)</label>
    <select id="uzaver_sin_technika" onchange="gen()">
      <option value="dotiahnutím sutúr Prostyle uzatváracieho zariadenia">ProStyle sutúra</option>
      <option value="pomocou Manta systému">Manta systém</option>
      <option value="manuálnou kompresiou">Manuálna kompresia</option>
    </select>
  </div>
</div>
<div class="checks">
  <label class="ck"><input type="checkbox" id="hemostaza_dx" checked onchange="gen()"><span>Hemostáza DX (PatchPro)</span></label>
  <label class="ck"><input type="checkbox" id="hemostaza_sin" checked onchange="gen()"><span>Hemostáza SIN (PatchPro)</span></label>
</div>
</div>

<!-- Záver -->
<div class="card">
<div class="st">Záver</div>
<div class="row r2">
  <div class="f"><label>Kontrolné CTA</label>
    <select id="odporucanie_cas" onchange="gen()">
      <option value="pred ukončením hospitalizácie">Pred ukončením hospitalizácie</option>
      <option value="do mesiaca od výkonu" selected>Do mesiaca od výkonu</option>
      <option value="do 3 mesiacov od výkonu">Do 3 mesiacov od výkonu</option>
      <option value="do 6 mesiacov od výkonu">Do 6 mesiacov od výkonu</option>
    </select>
  </div>
  <div class="f"><label>Lekári</label><input type="text" id="lekari" value="MUDr. Vincze, MUDr. Širila" oninput="gen()"></div>
</div>
<div class="f"><label>Záver výkonu</label><input type="text" id="zaver_vykonu" value="PEVAR AAA s dobrým efektom." oninput="gen()"></div>
</div>

</div><!-- end left -->

<div class="right">
  <textarea id="out" readonly></textarea>
  <div class="btns">
    <button class="btn bc" onclick="copyOut()">📋 Kopírovať</button>
    <button class="btn bp" onclick="saveToSupabase()">💾 Uložiť</button>
  </div>
  <div id="cmsg"></div>
</div>
</div><!-- end wrap -->

<script>
const SB_URL='https://ncqtiicfqhaturjlfxcj.supabase.co';
const SB_KEY='sb_publishable_DX_FaXYGNx70dB6m-PfhAA_H5NHyH3k';

function g(id){const el=document.getElementById(id);if(!el)return'';return el.value||'';}
function chk(id){const el=document.getElementById(id);return el?el.checked:false;}
function tB(id){const b=document.getElementById('b_'+id);if(b)b.classList.toggle('on');}

function gen(){
  const vek=g('vek');
  const pohlavie=g('pohlavie');
  const jeZena=pohlavie==='Žena';
  const vekText=vek?(vek+' ročn'+(jeZena?'á':'ý')):'';
  const pacientText=jeZena?'pacientka':'pacient';
  const indikaciaText=jeZena?'indikovaná':'indikovaný';
  const diagnoza=g('diagnoza');

  const charParts=[];
  if(chk('char_krehky'))charParts.push(jeZena?'krehká':'krehký');
  if(chk('char_polymorbidny'))charParts.push(jeZena?'polymorbidná':'polymorbidný');
  if(chk('symptomaticky'))charParts.push(jeZena?'symptomatická':'symptomatický');
  const char=charParts.join(', ');

  const indTyp=document.querySelector('input[name="ind_typ"]:checked')?.value||'elektívnemu';
  const uvod=[vekText,char,pacientText,diagnoza?'s '+diagnoza+',':'',indikaciaText+' k '+indTyp+' PEVAR:'].filter(Boolean).join(' ');

  const anestezia=g('anestezia_typ');
  const pristupVal=g('pristup_strana').split('|');
  const stranaText=pristupVal[0]||'obojstranne';
  const stranaSkr=pristupVal[1]||'l.utrq.';
  const arteria=g('punkcia_arteria');
  const technika=g('punkcia_technika');
  const navParts=[];
  if(chk('usg_nav'))navParts.push('USG');
  if(chk('rtg_nav'))navParts.push('RTG');
  const nav=navParts.length?' za použitia '+navParts.join(' a ')+' navigácie':'';
  const zabezp=g('zabezpecenie_technika');
  const sheath=g('sheath_velkost');
  const pristupText=`${anestezia}, ${technika}${nav}, pungujeme ${arteria} ${stranaSkr}. Zabezpečujeme miesta vpichu ${zabezp} ${stranaText} a zavádzame ${stranaText} ${sheath} sheath.`;

  const sgTyp=document.querySelector('input[name="sg_typ"]:checked')?.value||'bifurkačného';
  const isBifurk=sgTyp==='bifurkačného';
  // show/hide contra section
  const contraSection=document.getElementById('contra_section');
  if(contraSection)contraSection.style.display=isBifurk?'':'none';

  const katAorty=g('katetrizacia_aorty');
  const vodic=g('vodic_typ');
  const sgNazov=g('sg_nazov');
  const sgRozmery=g('sg_rozmery');
  const komentar=g('implantacia_komentar');

  const katLines=[
    katAorty?(katAorty+', po ktorom zavádzame '+vodic+'.'):('Zavádzame '+vodic+'.'),
    'Sprava zavádzame hlavné telo '+sgTyp+' stentgraftu '+sgNazov+' ('+sgRozmery+'), pomocou DSA verifikujeme odstup renálnych tepien a implantujeme telo SG.'
  ];
  if(isBifurk){
    const contraKat=g('contra_kateter_typ');
    const kDx=g('komponent_dx_nazov');const kDxR=g('komponent_dx_rozmery');
    const kSin=g('komponent_sin_nazov');const kSinR=g('komponent_sin_rozmery');
    katLines.push(contraKat+' katétrom a viacerými vodičmi katetrizujeme kontralaterálnu nožičku.');
    katLines.push('Sprava implantujeme distálnu komponentu '+kDx+' ('+kDxR+').');
    katLines.push('Zľava implantujeme distálnu komponentu '+kSin+' ('+kSinR+').');
  }
  // Extenzie
  if(chk('c_extenzie')){
    document.querySelectorAll('#extenzie_list .ext-row').forEach(row=>{
      const idx=row.dataset.idx;
      const naz=g('ext_'+idx+'_nazov');const roz=g('ext_'+idx+'_rozmery');const str=g('ext_'+idx+'_strana');
      if(naz||roz)katLines.push((str?str+': ':'')+'Implantujeme extenziu '+naz+(roz?' ('+roz+')':'')+'.');
    });
  }
  if(komentar)katLines.push(komentar);

  const modParts=[];
  if(chk('modelovanie_telo')){
    modParts.push('v oblasti tela stentgraftu pomocou '+g('modelovanie_telo_balon')+' balónu');
  }
  if(chk('modelovanie_extenzie')){
    const r=g('modelovanie_extenzie_rozmer');
    modParts.push('v oblasti extenzií pomocou '+g('modelovanie_extenzie_balon')+' balónu'+(r?' veľkosti '+r:''));
  }
  const modText=modParts.length?'Kritické miesta stentgraftu domodelované '+modParts.join(' a ')+'.':'';

  const agParts=['Na záverečnej DSA sa zobrazuje dobrý výsledok endovaskulárnej liečby AAA.'];
  if(chk('endoleak_check')){
    const typ=g('endoleak_typ');
    let v='Zobrazuje sa endoleak '+typ+'. typu';
    if(typ==='II')v+=' '+g('endoleak_typ2_zdroj');
    agParts.push(v+'.');
  } else {
    agParts.push('Nezobrazuje sa žiadny endoleak.');
  }
  if(chk('komponenty_ok'))agParts.push('Všetky komponenty dobre rozvinuté, bez stenózy.');

  const uzaverLines=[];
  const udt=g('uzaver_dx_technika');const ust=g('uzaver_sin_technika');
  if(udt){let v='Miesto vpichu '+arteria+' l.dx. uzatvárame '+udt;if(chk('hemostaza_dx'))v+=', dosahujeme úplnú hemostázu pomocou PatchPro bandáži';uzaverLines.push(v+'.');}
  if(ust){let v='Miesto vpichu '+arteria+' l.sin. uzatvárame '+ust;if(chk('hemostaza_sin'))v+=', dosahujeme úplnú hemostázu pomocou PatchPro bandáži';uzaverLines.push(v+'.');}

  const odp=g('odporucanie_cas');
  const zaver=g('zaver_vykonu');
  const lekari=g('lekari');

  const parts=[
    uvod,
    pristupText,
    katLines.join('\n'),
    [modText,...agParts].filter(Boolean).join(' '),
    uzaverLines.join('\n'),
    'Odporúčame prvé kontrolné CTA vyšetrenie '+odp+'.',
    'Z: '+zaver,
    '\n'+lekari
  ];
  document.getElementById('out').value=parts.filter(Boolean).join('\n\n');
}

let extCnt=0;
const SG_OPTS='<option>Ovation</option><option>Endurant</option><option>Cook</option><option>MINOS</option><option>Incraft</option>';
function addExtenzia(){
  const idx=extCnt++;
  const id='ext_'+idx;
  const cont=document.getElementById('extenzie_list');
  const div=document.createElement('div');div.className='dyn-row ext-row';div.dataset.idx=idx;
  div.innerHTML=`<button type="button" class="del-btn-x" onclick="delExtenzia(${idx})">✕</button>
    <div class="row r2" style="margin-bottom:0">
      <div class="f"><label>Strana</label>
        <select id="${id}_strana" onchange="gen()">
          <option value="">–</option><option value="Sprava">Sprava</option><option value="Zľava">Zľava</option><option value="Obojstranne">Obojstranne</option>
        </select>
      </div>
      <div class="f"><label>Názov</label><select id="${id}_nazov" onchange="gen()">${SG_OPTS}</select></div>
    </div>
    <div class="f" style="margin-top:6px"><label>Rozmery (mm)</label><input type="text" id="${id}_rozmery" placeholder="napr. 16x80mm" oninput="gen()"></div>`;
  cont.appendChild(div);gen();
}
function delExtenzia(idx){const r=document.querySelector('#extenzie_list [data-idx="'+idx+'"]');if(r)r.remove();gen();}

function copyOut(){
  const out=document.getElementById('out');
  out.select();
  try{document.execCommand('copy');msg('Skopírované!','#1d6f42');}
  catch{navigator.clipboard.writeText(out.value).then(()=>msg('Skopírované!','#1d6f42'));}
}

function msg(t,c){const el=document.getElementById('cmsg');el.style.color=c;el.textContent=t;setTimeout(()=>el.textContent='',3000);}

async function saveToSupabase(){
  const pristupVal=g('pristup_strana').split('|');
  const payload={
    datum_zaznamu:g('datum_zaznamu')||new Date().toISOString().slice(0,10),
    vek:parseInt(g('vek'))||null,
    pohlavie:g('pohlavie'),
    diagnoza:g('diagnoza'),
    char_krehky:chk('char_krehky'),
    char_polymorbidny:chk('char_polymorbidny'),
    symptomaticky:chk('symptomaticky'),
    indikacia_typ:document.querySelector('input[name="ind_typ"]:checked')?.value||'',
    anestezia_typ:g('anestezia_typ'),
    pristup_strana:pristupVal[0]||'',
    punkcia_arteria:g('punkcia_arteria'),
    punkcia_technika:g('punkcia_technika'),
    usg_nav:chk('usg_nav'),
    rtg_nav:chk('rtg_nav'),
    zabezpecenie_technika:g('zabezpecenie_technika'),
    sheath_velkost:g('sheath_velkost'),
    vodic_typ:g('vodic_typ'),
    sg_nazov:g('sg_nazov'),
    sg_rozmery:g('sg_rozmery'),
    indikacia_typ:(document.querySelector('input[name="sg_typ"]:checked')?.value||'')+' – '+(document.querySelector('input[name="ind_typ"]:checked')?.value||''),
    contra_kateter_typ:g('contra_kateter_typ'),
    komponent_dx_nazov:g('komponent_dx_nazov'),
    komponent_dx_rozmery:g('komponent_dx_rozmery'),
    komponent_sin_nazov:g('komponent_sin_nazov'),
    komponent_sin_rozmery:g('komponent_sin_rozmery'),
    implantacia_komentar:g('implantacia_komentar'),
    modelovanie_telo:chk('modelovanie_telo'),
    modelovanie_telo_balon:chk('modelovanie_telo')?g('modelovanie_telo_balon'):'',
    modelovanie_extenzie:chk('modelovanie_extenzie'),
    modelovanie_extenzie_balon:chk('modelovanie_extenzie')?g('modelovanie_extenzie_balon'):'',
    modelovanie_extenzie_rozmer:chk('modelovanie_extenzie')?g('modelovanie_extenzie_rozmer'):'',
    endoleak:chk('endoleak_check'),
    endoleak_typ:chk('endoleak_check')?g('endoleak_typ'):'',
    endoleak_zdroj:chk('endoleak_check')?g('endoleak_typ2_zdroj'):'',
    komponenty_ok:chk('komponenty_ok'),
    uzaver_dx_technika:g('uzaver_dx_technika'),
    uzaver_sin_technika:g('uzaver_sin_technika'),
    hemostaza_dx:chk('hemostaza_dx'),
    hemostaza_sin:chk('hemostaza_sin'),
    odporucanie_cas:g('odporucanie_cas'),
    zaver_vykonu:g('zaver_vykonu'),
    lekari:g('lekari')
  };
  msg('Ukladám...','#5a6a8a');
  try{
    const r=await fetch(SB_URL+'/rest/v1/pevar_vykony',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=minimal'},
      body:JSON.stringify(payload)
    });
    if(r.ok)msg('Uložené ✓','#1d6f42');
    else{const e=await r.json();msg('Chyba: '+(e.message||r.status),'#dc2626');}
  }catch(e){msg('Chyba siete: '+e.message,'#dc2626');}
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('datum_zaznamu').value=new Date().toISOString().slice(0,10);
  gen();
});
</script>
