<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cesta pacienta – cievny.sk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f0f2f5;color:#1a1a2e}
.wrap{max-width:820px;margin:0 auto;padding:18px 16px 80px}
h1{font-size:19px;color:#1a2745;margin-bottom:4px}
.sub{font-size:12.5px;color:#6b7280;margin-bottom:16px}
.card{background:#fff;border-radius:10px;padding:15px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.searchbar{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.f{flex:1;min-width:180px}
.f label{display:block;font-size:11.5px;color:#5a6a8a;font-weight:600;margin-bottom:3px}
input[type=text]{width:100%;padding:9px 11px;border:1.5px solid #dde1ea;border-radius:8px;font-size:15px}
input:focus{outline:none;border-color:#3b82f6}
.btn{padding:10px 18px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;background:#1e40af;color:#fff}
.btn:hover{background:#1737a0}
.msg{font-size:13px;margin-top:10px;color:#5a6a8a;min-height:18px}
.pat-hd{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;border-bottom:2px solid #eef0f5;padding-bottom:8px;margin-bottom:10px}
.pat-hd b{font-size:16px;color:#1a2745}
.pat-hd span{font-size:12.5px;color:#6b7280}
.tl{position:relative;margin-left:8px;padding-left:18px;border-left:2px solid #dbe3f0}
.ev{position:relative;margin-bottom:14px}
.ev::before{content:'';position:absolute;left:-25px;top:3px;width:11px;height:11px;border-radius:50%;background:#3b82f6;border:2px solid #fff;box-shadow:0 0 0 2px #dbe3f0}
.ev .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.tag-evk{background:#dbeafe;color:#1e40af}.tag-cas{background:#dcfce7;color:#166534}
.tag-pevar{background:#fef3c7;color:#92400e}.tag-ras{background:#fae8ff;color:#86198f}
.ev .dt{font-weight:700;color:#1a2745}
.ev .vid{font-size:12px;color:#6b7280}
.ev .det{font-size:12.5px;color:#374151;margin-top:2px}
.ev .fu{font-size:12px;color:#5a6a8a;margin-top:4px;padding-left:6px;border-left:2px solid #eef0f5}
.ev a.edit{font-size:11.5px;color:#1e40af;text-decoration:none;margin-left:auto}
.empty{color:#9ca3af;font-size:13px;padding:6px 0}
</style>
</head>
<body>
<script src="/tools/auth.js"></script>
<script>checkAuth();</script>

<div class="wrap">
<h1>🧍 Cesta pacienta</h1>
<div class="sub">Všetky výkony a kontroly jedného pacienta naprieč nástrojmi. Rodné číslo sa spracuje len na vyhľadanie – nikam sa neukladá.</div>

<div class="card">
  <div class="searchbar">
    <div class="f"><label>Rodné číslo pacienta</label><input type="text" id="rc" placeholder="napr. 9001011234" autocomplete="off" inputmode="numeric"></div>
    <button class="btn" onclick="hladaj()">🔎 Nájsť</button>
  </div>
  <div class="msg" id="msg"></div>
</div>

<div id="out"></div>
</div>

<script>
const SB_URL='https://ncqtiicfqhaturjlfxcj.supabase.co';
const SB_KEY='sb_publishable_DX_FaXYGNx70dB6m-PfhAA_H5NHyH3k';
const H=()=>({'apikey':SB_KEY,'Authorization':'Bearer '+sbToken(),'Content-Type':'application/json'});
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function msg(t,c){const e=document.getElementById('msg');e.textContent=t||'';e.style.color=c||'#5a6a8a';}

// definícia tabuliek: [tool, tabuľka, stĺpec dátumu, funkcia zhrnutia, url editora]
const TOOLS=[
  ['evk','evk_vykony','datum',   r=>[r.diag,r.riecisko].filter(Boolean).join(' · '),          '/tools/EVK/'],
  ['cas','cas_vykony','datum_zaznamu', r=>[r.lokalizacia,r.postup==='konzervativny'?'konzervatívne':''].filter(Boolean).join(' · '), '/tools/CAS-generator/'],
  ['pevar','pevar_vykony','datum_zaznamu', r=>[r.typ_vykonu,r.diagnoza].filter(Boolean).join(' · '), '/tools/PEVAR/'],
  ['ras','ras_vykony','datum_zaznamu', r=>[r.typ_vykonu,(r.lokalizacia||'')+(r.strana?' '+r.strana:'')].filter(Boolean).join(' · '), '/tools/RAS/'],
];
const FU={evk:'evk_followup',cas:'cas_followup',pevar:'pevar_followup',ras:'ras_followup'};
const LBL={evk:'EVK',cas:'CAS',pevar:'PEVAR',ras:'RAS'};

async function get(path){const r=await fetch(SB_URL+'/rest/v1/'+path,{headers:H()});return r.ok?r.json():[];}

async function hladaj(){
  const rc=(document.getElementById('rc').value||'').replace(/\D/g,'');
  document.getElementById('out').innerHTML='';
  if(rc.length<6){msg('⚠️ Zadajte platné rodné číslo (aspoň 6 číslic).','#b45309');return;}
  msg('Hľadám…');
  let pid=null;
  try{
    const r=await fetch(SB_URL+'/rest/v1/rpc/najdi_pacienta',{method:'POST',headers:H(),body:JSON.stringify({p_rc:rc})});
    if(r.ok){const v=await r.json();pid=typeof v==='string'?v:(Array.isArray(v)?v[0]:v);}
    else if(r.status===404){msg('❌ Chýba funkcia najdi_pacienta – spustite v2 setup SQL.','#dc2626');return;}
  }catch(e){msg('❌ Chyba siete.','#dc2626');return;}
  if(!pid){msg('Pacient s týmto RČ zatiaľ nemá žiadny spárovaný výkon.','#6b7280');return;}
  msg('');
  // stiahni výkony zo všetkých nástrojov + follow-upy
  const events=[];let meta=null;
  for(const [tool,tab,dcol,summ] of TOOLS){
    const rows=await get(tab+'?pacient_id=eq.'+encodeURIComponent(pid)+'&select=*');
    for(const r of rows){
      if(!meta&&(r.vek||r.pohlavie))meta={vek:r.vek,pohlavie:r.pohlavie};
      const fus=r.vykon_id?await get(FU[tool]+'?vykon_id=eq.'+encodeURIComponent(r.vykon_id)+'&select=datum_kontroly,casovy_bod,reintervencia,exitus&order=datum_kontroly.asc'):[];
      events.push({tool,tab,dcol,r,datum:(r[dcol]||r.created_at||'').slice(0,10),summ:summ(r),fus});
    }
  }
  events.sort((a,b)=>(b.datum||'').localeCompare(a.datum||''));
  render(pid,meta,events);
}

function render(pid,meta,events){
  const out=document.getElementById('out');
  if(!events.length){out.innerHTML='<div class="card empty">Pacient nájdený, ale bez výkonov (možno len v tabuľke bez pacient_id).</div>';return;}
  const metaTxt=meta?[meta.vek?meta.vek+' r.':'',meta.pohlavie].filter(Boolean).join(' · '):'';
  const cnt={};events.forEach(e=>cnt[e.tool]=(cnt[e.tool]||0)+1);
  const cntTxt=Object.keys(cnt).map(t=>LBL[t]+' '+cnt[t]).join(' · ');
  let h='<div class="card"><div class="pat-hd"><b>Pacient</b>'+(metaTxt?'<span>'+esc(metaTxt)+'</span>':'')+'<span>'+events.length+' výkonov · '+esc(cntTxt)+'</span></div><div class="tl">';
  for(const e of events){
    const editRec=encodeURIComponent(JSON.stringify({tool:e.tool.toUpperCase()==='EVK'?'EVK':e.tool==='cas'?'CAS':e.tool==='pevar'?'PEVAR':'RAS'}));
    h+='<div class="ev"><div class="row1"><span class="tag tag-'+e.tool+'">'+LBL[e.tool]+'</span>'+
       '<span class="dt">'+esc(e.datum?e.datum.split('-').reverse().join('.'):'—')+'</span>'+
       '<span class="vid">'+esc(e.r.vykon_id||'')+'</span>'+
       (e.r.operator?'<span class="vid">· '+esc(e.r.operator)+'</span>':'')+
       '<a class="edit" href="#" data-tool="'+e.tool+'" data-tab="'+e.tab+'" data-id="'+esc(e.r.id)+'">✏️ upraviť</a></div>';
    if(e.summ)h+='<div class="det">'+esc(e.summ)+'</div>';
    for(const f of e.fus){
      const bits=[f.casovy_bod,(f.datum_kontroly||'').slice(0,10).split('-').reverse().join('.')].filter(Boolean);
      if(f.reintervencia)bits.push('reintervencia');
      if(f.exitus)bits.push('† exitus');
      h+='<div class="fu">📅 kontrola: '+esc(bits.join(' · '))+'</div>';
    }
    h+='</div>';
  }
  h+='</div></div>';
  out.innerHTML=h;
  // edit prelink cez Záznamy vzor (stiahni celý záznam, ulož do cievny_edit)
  out.querySelectorAll('a.edit').forEach(a=>a.addEventListener('click',async ev=>{
    ev.preventDefault();
    const tab=a.dataset.tab,id=a.dataset.id,tool=a.dataset.tool;
    const rows=await get(tab+'?id=eq.'+encodeURIComponent(id)+'&select=*');
    if(!rows.length){alert('Záznam sa nepodarilo načítať.');return;}
    const TOOLMAP={evk:'EVK',cas:'CAS',pevar:'PEVAR',ras:'RAS'};
    const URLMAP={evk:'/tools/EVK/',cas:'/tools/CAS-generator/',pevar:'/tools/PEVAR/',ras:'/tools/RAS/'};
    sessionStorage.setItem('cievny_edit',JSON.stringify({tool:TOOLMAP[tool],record:rows[0]}));
    window.location.href=URLMAP[tool];
  }));
}

document.getElementById('rc').addEventListener('keydown',e=>{if(e.key==='Enter')hladaj();});
</script>
</body>
</html>
