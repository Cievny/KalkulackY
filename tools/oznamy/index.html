<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Oznamy – cievny.sk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f7;min-height:100vh;}
h1{font-size:18px;font-weight:700;color:#1a2745;padding:20px 20px 0;max-width:860px;margin:0 auto;}
.page-sub{font-size:13px;color:#6b7280;padding:4px 20px 0;max-width:860px;margin:0 auto;}
.wrap{max-width:860px;margin:0 auto;padding:16px 20px 30px;}
.add-card{background:#eff6ff;border:1.5px dashed #93c5fd;border-radius:12px;padding:14px 16px;margin-bottom:18px;}
.add-card input[type=text],.add-card textarea{width:100%;padding:9px 11px;border:1.5px solid #bfdbfe;border-radius:8px;font-size:13.5px;font-family:inherit;outline:none;background:#fff;color:#1a2745;}
.add-card textarea{min-height:70px;resize:vertical;margin-top:8px;}
.add-card input:focus,.add-card textarea:focus{border-color:#3b82f6;}
.add-opts{display:flex;gap:12px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.add-opts label{font-size:12.5px;color:#374151;display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:600;}
.add-opts input[type=date]{padding:6px 9px;border:1.5px solid #bfdbfe;border-radius:7px;font-size:12.5px;outline:none;background:#fff;}
.btn-add{padding:9px 18px;background:#1e40af;color:#fff;border:none;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;margin-left:auto;}
.btn-add:hover{background:#1737a0;}
.oznam{background:#fff;border:1.5px solid #e5e9f5;border-radius:12px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.oznam.dolezity{border-left:5px solid #dc2626;background:#fffbfb;}
.oznam.expirovany{opacity:.55;}
.o-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.o-nadpis{font-size:15px;font-weight:700;color:#1a2745;flex:1;min-width:150px;}
.o-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:9px;background:#fee2e2;color:#dc2626;letter-spacing:.4px;}
.o-badge-exp{background:#f0f2f7;color:#6b7280;}
.o-text{font-size:13.5px;color:#374151;line-height:1.55;margin-top:7px;white-space:pre-wrap;word-break:break-word;}
.o-meta{font-size:11px;color:#9ca3af;margin-top:9px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.o-del{margin-left:auto;font-size:11px;font-weight:600;padding:3px 9px;border:1.5px solid #fca5a5;border-radius:5px;background:#fff;cursor:pointer;color:#dc2626;}
.o-del:hover{background:#fef2f2;}
.bfile{font-size:12.5px;font-weight:700;padding:7px 14px;border:1.5px solid #93c5fd;border-radius:8px;background:#eff6ff;cursor:pointer;color:#1e40af;}
.bfile:hover{background:#dbeafe;}
.empty{padding:26px;text-align:center;color:#9ca3af;font-size:13.5px;}
.msg{font-size:12.5px;font-weight:600;margin-left:10px;}
details.exp-box summary{font-size:13px;font-weight:700;color:#6b7280;cursor:pointer;padding:8px 0;user-select:none;}
.o-sec{margin-top:11px;padding-top:10px;border-top:1px dashed #e5e9f5;}
.o-sec-h{font-size:11.5px;font-weight:800;color:#6b7280;letter-spacing:.3px;margin-bottom:7px;text-transform:uppercase;}
.komm{font-size:12.5px;color:#374151;padding:6px 0;border-bottom:1px solid #f2f4f9;line-height:1.45;word-break:break-word;}
.komm:last-child{border-bottom:none;}
.komm .kmeta{font-size:10.5px;color:#9ca3af;margin-top:2px;}
.komm .kdel{margin-left:7px;color:#dc2626;cursor:pointer;font-weight:700;text-decoration:none;}
.kadd{display:flex;gap:6px;margin-top:8px;}
.kadd input{flex:1;padding:7px 10px;border:1.5px solid #dde1ea;border-radius:7px;font-size:12.5px;outline:none;background:#fff;}
.kadd input:focus{border-color:#3b82f6;}
.kadd button{padding:7px 13px;background:#1e40af;color:#fff;border:none;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;}
.pchip{display:inline-flex;align-items:center;gap:5px;background:#eef6ff;border:1px solid #cfe0ff;color:#1e40af;border-radius:20px;padding:3px 11px;font-size:12px;font-weight:600;margin:0 6px 6px 0;}
.pchip .pdel{color:#dc2626;cursor:pointer;font-weight:700;}
.pbtn{padding:7px 15px;background:#1e40af;color:#fff;border:none;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;}
.pbtn.off{background:#fff;color:#1e40af;border:1.5px solid #93c5fd;}
.pbtn:disabled{background:#e5e7eb;color:#9ca3af;cursor:not-allowed;}
.pfull{font-size:12px;font-weight:700;color:#b45309;margin-left:8px;}
</style>
</head>
<body>
<script src="/tools/auth.js"></script>
<script src="/tools/gcal-config.js"></script>
<script>checkAuth();</script>

<h1>📢 Oznamy oddelenia</h1>
<p class="page-sub">Dôležité informácie pre celý tím — vidia ich všetci prihlásení.</p>

<div class="wrap">
  <!-- Zdieľaný Google kalendár oddelenia (podujatia, dovolenky) – adresa v /tools/gcal-config.js -->
  <div id="gcal_card" style="display:none;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden">
    <details open>
      <summary style="padding:12px 16px;font-size:14px;font-weight:700;color:#1a2745;cursor:pointer;user-select:none">📆 Kalendár oddelenia — podujatia, dovolenky <a href="/tools/kalendar/" style="font-size:12px;font-weight:600;color:#1e40af;margin-left:8px" onclick="event.stopPropagation()">celý kalendár →</a></summary>
      <iframe id="gcal_frame" style="width:100%;height:420px;border:0" loading="lazy"></iframe>
    </details>
  </div>
  <div class="add-card">
    <input type="text" id="n_nadpis" placeholder="Nadpis oznamu (napr. Zajtra seminár o 7:30)" maxlength="120">
    <textarea id="n_text" placeholder="Text oznamu…"></textarea>
    <div class="add-opts">
      <label><input type="checkbox" id="n_dolezite"> 🔴 Dôležité (navrchu, zvýraznené)</label>
      <label>Platí do: <input type="date" id="n_platne_do" title="po tomto dátume sa oznam presunie medzi staršie"></label>
    </div>
    <div class="add-opts">
      <label><input type="checkbox" id="n_komentare"> 💬 Povoliť komentáre</label>
      <label><input type="checkbox" id="n_prihlas" onchange="document.getElementById('n_kap_wrap').style.display=this.checked?'inline-flex':'none'"> ✍️ Prihlasovanie (workshop / akcia)</label>
      <label id="n_kap_wrap" style="display:none">Kapacita: <input type="number" id="n_kapacita" min="1" placeholder="napr. 20" style="width:84px;padding:6px 8px;border:1.5px solid #bfdbfe;border-radius:7px;font-size:12.5px;background:#fff"></label>
    </div>
    <div class="add-opts">
      <label style="flex:1">📎 Príloha: <input type="file" id="n_file" accept=".xls,.xlsx,.csv,.pdf,.doc,.docx,image/*" style="font-size:12px"></label>
      <button class="btn-add" onclick="addOznam()">📢 Zverejniť</button>
      <span class="msg" id="o_msg"></span>
    </div>
  </div>

  <div id="oznamy_list"></div>

  <details class="exp-box" id="exp_box" style="display:none">
    <summary>🗂 Staršie / neplatné oznamy (<span id="exp_cnt">0</span>)</summary>
    <div id="exp_list"></div>
  </details>
</div>

<script>
const SB_URL='https://ncqtiicfqhaturjlfxcj.supabase.co';
const SB_KEY='sb_publishable_DX_FaXYGNx70dB6m-PfhAA_H5NHyH3k';
const H=()=>({'apikey':SB_KEY,'Authorization':'Bearer '+sbToken(),'Content-Type':'application/json'});
const BUCKET='oznamy-prilohy';

let OZNAMY=[],REAKCIE={};
const ADMINS=['vincze.lukas@gmail.com','oira@cievny.sk'];
function myMail(){return (window.sbUserEmail&&window.sbUserEmail())||'';}
function jeAdmin(){return ADMINS.includes(myMail());}
function g(id){return (document.getElementById(id)||{}).value||'';}
function escHtml(t){return String(t??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function shortMail(e){return (e||'').split('@')[0];}
function msg(t,c){const el=document.getElementById('o_msg');el.textContent=t;el.style.color=c;setTimeout(()=>{if(el.textContent===t)el.textContent='';},4000);}
function fmtD(d){if(!d)return'';const x=new Date(d);return isNaN(x)?'':x.toLocaleDateString('sk-SK');}
function isoLocal(d){const z=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
function jeExpirovany(o){return o.platne_do&&o.platne_do<isoLocal(new Date());}

async function load(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/oznamy?order=created_at.desc&limit=300`,{headers:H()});
    if(!r.ok){document.getElementById('oznamy_list').innerHTML='<div class="empty">⚠️ Tabuľka oznamy nie je v Supabase — spustite priložený SQL.</div>';return;}
    OZNAMY=await r.json();
    REAKCIE={};
    try{
      const rr=await fetch(`${SB_URL}/rest/v1/oznam_reakcie?order=created_at.asc&limit=3000`,{headers:H()});
      if(rr.ok)(await rr.json()).forEach(x=>{(REAKCIE[x.oznam_id]=REAKCIE[x.oznam_id]||[]).push(x);});
    }catch(e){}
  }catch(e){msg('⚠️ Chyba spojenia','#dc2626');return;}
  render();
}

function oznamEl(o){
  const div=document.createElement('div');
  div.className='oznam'+(o.dolezite?' dolezity':'')+(jeExpirovany(o)?' expirovany':'');
  const datum=new Date(o.created_at).toLocaleDateString('sk-SK',{day:'numeric',month:'numeric',year:'numeric'});
  div.innerHTML=`
    <div class="o-head">
      ${o.dolezite?'<span class="o-badge">📌 DÔLEŽITÉ</span>':''}
      ${jeExpirovany(o)?'<span class="o-badge o-badge-exp">neplatné</span>':''}
      <span class="o-nadpis">${escHtml(o.nadpis||'(bez nadpisu)')}</span>
      <button class="o-del" onclick="delOznam('${o.id}')">🗑 Zmazať</button>
    </div>
    ${o.text?'<div class="o-text">'+escHtml(o.text)+'</div>':''}
    ${o.priloha_path?'<div style="margin-top:8px"><button class="bfile" onclick="openPriloha(\''+o.id+'\')">📎 '+escHtml(o.priloha_nazov||'príloha')+'</button></div>':''}
    <div class="o-meta">
      <span>👤 ${o.created_by?escHtml(shortMail(o.created_by)):'–'}</span>
      <span>🗓 ${datum}</span>
      ${o.platne_do?'<span>⏳ platí do '+fmtD(o.platne_do)+'</span>':''}
    </div>
    ${o.povolit_prihlasovanie?prihlaskySekcia(o):''}
    ${o.povolit_komentare?komentareSekcia(o):''}`;
  return div;
}

function reakcieTyp(oznamId,typ){return (REAKCIE[oznamId]||[]).filter(r=>r.typ===typ);}
function mozeZmazat(o,r){const me=myMail();return jeAdmin()||r.created_by===me||o.created_by===me;}

function prihlaskySekcia(o){
  const list=reakcieTyp(o.id,'prihlaska');
  const me=myMail();
  const mine=list.find(r=>r.created_by===me);
  const kap=o.kapacita?parseInt(o.kapacita):0;
  const full=kap>0&&list.length>=kap&&!mine;
  const chips=list.map(r=>{
    const nm=escHtml(r.meno||shortMail(r.created_by||''));
    const del=mozeZmazat(o,r)?`<span class="pdel" onclick="delReakcia('${r.id}')" title="odhlásiť">✕</span>`:'';
    return `<span class="pchip">✍️ ${nm}${del}</span>`;
  }).join('');
  const btn=mine
    ? `<button class="pbtn off" onclick="odhlasit('${mine.id}')">Odhlásiť sa</button>`
    : `<button class="pbtn" ${full?'disabled':''} onclick="prihlasit('${o.id}')">＋ Prihlásiť sa</button>`;
  return `<div class="o-sec">
    <div class="o-sec-h">✍️ Prihlásení (${list.length}${kap>0?' / '+kap:''})</div>
    <div>${chips||'<span style="font-size:12px;color:#9ca3af">Zatiaľ nikto — buďte prvý.</span>'}</div>
    <div style="margin-top:8px">${btn}${full?'<span class="pfull">Kapacita naplnená</span>':''}</div>
  </div>`;
}

function komentareSekcia(o){
  const list=reakcieTyp(o.id,'komentar');
  const items=list.map(r=>{
    const del=mozeZmazat(o,r)?`<a class="kdel" onclick="delReakcia('${r.id}')">zmazať</a>`:'';
    return `<div class="komm">${escHtml(r.text||'')}<div class="kmeta">👤 ${escHtml(shortMail(r.created_by||'–'))} · ${fmtD(r.created_at)}${del}</div></div>`;
  }).join('');
  return `<div class="o-sec">
    <div class="o-sec-h">💬 Komentáre (${list.length})</div>
    <div>${items||'<span style="font-size:12px;color:#9ca3af">Žiadne komentáre.</span>'}</div>
    <div class="kadd">
      <input type="text" id="km_${o.id}" placeholder="Napíšte komentár…" maxlength="500" onkeydown="if(event.key==='Enter')addKomentar('${o.id}')">
      <button onclick="addKomentar('${o.id}')">Pridať</button>
    </div>
  </div>`;
}

function render(){
  const platne=OZNAMY.filter(o=>!jeExpirovany(o))
    .sort((a,b)=>(b.dolezite?1:0)-(a.dolezite?1:0)||(b.created_at||'').localeCompare(a.created_at||''));
  const stare=OZNAMY.filter(jeExpirovany);
  const box=document.getElementById('oznamy_list');box.innerHTML='';
  if(!platne.length)box.innerHTML='<div class="empty">Žiadne aktuálne oznamy.</div>';
  platne.forEach(o=>box.appendChild(oznamEl(o)));
  const eb=document.getElementById('exp_box');
  eb.style.display=stare.length?'':'none';
  document.getElementById('exp_cnt').textContent=stare.length;
  const el=document.getElementById('exp_list');el.innerHTML='';
  stare.forEach(o=>el.appendChild(oznamEl(o)));
}

async function addOznam(){
  const nadpis=g('n_nadpis').trim();
  const text=g('n_text').trim();
  const fInp=document.getElementById('n_file');
  const f=fInp.files&&fInp.files[0];
  if(!nadpis&&!text&&!f){msg('⚠️ Napíšte nadpis, text alebo priložte súbor','#b45309');return;}
  const prihlas=document.getElementById('n_prihlas').checked;
  const body={
    nadpis:nadpis||null,
    text:text||null,
    dolezite:document.getElementById('n_dolezite').checked,
    platne_do:g('n_platne_do')||null,
    povolit_komentare:document.getElementById('n_komentare').checked,
    povolit_prihlasovanie:prihlas,
    kapacita:(prihlas&&g('n_kapacita'))?parseInt(g('n_kapacita')):null
  };
  try{
    if(f){
      if(f.size>20*1024*1024){msg('⚠️ Súbor je väčší ako 20 MB','#b45309');return;}
      msg('⏳ Nahrávam súbor…','#3b82f6');
      const path=Date.now()+'_'+f.name.replace(/[^\w.\-]+/g,'_');
      const up=await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${path}`,{method:'POST',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+sbToken(),'Content-Type':f.type||'application/octet-stream','x-upsert':'false'},body:f});
      if(!up.ok){msg('❌ Upload zlyhal: '+up.status+(up.status===400||up.status===404?' (spustite SQL pre bucket oznamy-prilohy)':''),'#dc2626');return;}
      body.priloha_path=path;
      body.priloha_nazov=f.name;
      body.priloha_mime=f.type||null;
    }
    const r=await fetch(`${SB_URL}/rest/v1/oznamy`,{method:'POST',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify(body)});
    if(r.ok){
      ['n_nadpis','n_text','n_platne_do','n_kapacita'].forEach(i=>document.getElementById(i).value='');
      ['n_dolezite','n_komentare','n_prihlas'].forEach(i=>document.getElementById(i).checked=false);
      document.getElementById('n_kap_wrap').style.display='none';
      fInp.value='';
      msg('✓ Zverejnené','#1d6f42');
      await load();
    }else msg('❌ Chyba: '+r.status+(r.status===404?' (spustite setup SQL)':''),'#dc2626');
  }catch(e){msg('❌ Chyba siete','#dc2626');}
}

async function openPriloha(id){
  const o=OZNAMY.find(x=>x.id===id);
  if(!o||!o.priloha_path)return;
  try{
    const r=await fetch(`${SB_URL}/storage/v1/object/sign/${BUCKET}/${o.priloha_path}`,{method:'POST',headers:H(),body:JSON.stringify({expiresIn:3600})});
    if(!r.ok){msg('❌ Nepodarilo sa otvoriť súbor: '+r.status,'#dc2626');return;}
    const j=await r.json();
    window.open(SB_URL+'/storage/v1'+j.signedURL,'_blank');
  }catch(e){msg('❌ Chyba siete','#dc2626');}
}

async function delOznam(id){
  if(!confirm('Zmazať tento oznam?'))return;
  try{
    const o=OZNAMY.find(x=>x.id===id);
    // najprv riadok, až potom prílohu – aby po zlyhaní neostal oznam bez prílohy
    const r=await fetch(`${SB_URL}/rest/v1/oznamy?id=eq.${id}`,{method:'DELETE',headers:H()});
    if(!r.ok){msg('❌ Nepodarilo sa zmazať oznam: '+r.status,'#dc2626');return;}
    if(o&&o.priloha_path){
      const rf=await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${o.priloha_path}`,{method:'DELETE',headers:H()});
      if(!rf.ok)msg('⚠️ Oznam zmazaný, ale prílohu sa nepodarilo odstrániť ('+rf.status+')','#b45309');
    }
    await load();
  }catch(e){msg('❌ Chyba siete','#dc2626');}
}

async function postReakcia(body){
  const r=await fetch(`${SB_URL}/rest/v1/oznam_reakcie`,{method:'POST',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify(body)});
  if(!r.ok){msg('❌ Chyba: '+r.status+(r.status===404?' (spustite SQL pre oznam_reakcie)':''),'#dc2626');return false;}
  return true;
}

async function addKomentar(oznamId){
  const inp=document.getElementById('km_'+oznamId);
  const t=(inp&&inp.value||'').trim();
  if(!t)return;
  if(await postReakcia({oznam_id:oznamId,typ:'komentar',text:t}))await load();
}

async function prihlasit(oznamId){
  const o=OZNAMY.find(x=>x.id===oznamId);
  const already=reakcieTyp(oznamId,'prihlaska').some(r=>r.created_by===myMail());
  if(already)return;
  // voliteľné celé meno (ak sa niekto prihlasuje a chce uviesť plné meno)
  const meno=(prompt('Prihlásiť sa'+(o&&o.nadpis?' – '+o.nadpis:'')+'.\nMeno (nepovinné, inak sa použije váš login):','')||'').trim();
  if(await postReakcia({oznam_id:oznamId,typ:'prihlaska',meno:meno||null}))await load();
}

async function odhlasit(reakciaId){return delReakcia(reakciaId,true);}

async function delReakcia(id,skipConfirm){
  if(!skipConfirm&&!confirm('Naozaj zmazať?'))return;
  try{
    const r=await fetch(`${SB_URL}/rest/v1/oznam_reakcie?id=eq.${id}`,{method:'DELETE',headers:H()});
    if(r.ok)await load();else msg('❌ Nepodarilo sa zmazať: '+r.status,'#dc2626');
  }catch(e){msg('❌ Chyba siete','#dc2626');}
}

load();
// oznamy sa obnovujú každú minútu (nástenka môže byť otvorená celý deň)
// – preskoč, ak práve niekto píše komentár / prihlášku (aby sa mu text nezmazal)
setInterval(()=>{
  if(document.visibilityState!=='visible')return;
  const a=document.activeElement;
  if(a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA')&&a.value.trim())return;
  load();
},60000);

</script>
<script>
// Zdieľaný kalendár (podujatia/dovolenky). Dva režimy:
//  1. verejný embed (adresa v /tools/gcal-config.js alebo dočasná per-device),
//  2. NEVEREJNÝ kalendár: udalosti synchronizované GitHub Actions do tabuľky
//     kalendar_udalosti (tajná iCal adresa v Secrets) – vykreslia sa natívne.
(function(){
  let src=window.GCAL_EMBED||'';
  if(!src){try{src=localStorage.getItem('cievny_gcal')||'';}catch(e){}}
  if(/^https:\/\/calendar\.google\.com\/calendar\/embed\?/.test(src)){
    try{
      const u=new URL(src);
      u.searchParams.set('mode','AGENDA');
      if(!u.searchParams.get('ctz'))u.searchParams.set('ctz','Europe/Bratislava');
      document.getElementById('gcal_frame').src=u.toString();
      document.getElementById('gcal_card').style.display='';
      return;
    }catch(e){}
  }
  nacitajUdalosti();
})();
async function nacitajUdalosti(){
  try{
    const dnes=new Date(),p=n=>String(n).padStart(2,'0');
    const od=dnes.getFullYear()+'-'+p(dnes.getMonth()+1)+'-'+p(dnes.getDate());
    const r=await fetch(`${SB_URL}/rest/v1/kalendar_udalosti?zaciatok=gte.${od}&order=zaciatok.asc&limit=25`,{headers:H()});
    if(!r.ok)return;
    const rows=await r.json();
    if(!rows.length)return;
    const fmtD=s=>{const [y,m,d]=s.slice(0,10).split('-');return parseInt(d)+'. '+parseInt(m)+'.';};
    const html=rows.map(u=>{
      const cas=u.cely_den?'' :' '+(u.zaciatok.slice(11,16)||'');
      let datum=fmtD(u.zaciatok)+cas;
      if(u.cely_den&&u.koniec&&u.koniec.slice(0,10)>u.zaciatok.slice(0,10)){
        const kon=new Date(u.koniec.slice(0,10));kon.setDate(kon.getDate()-1); // iCal DTEND je exkluzívny
        const ks=kon.getFullYear()+'-'+p(kon.getMonth()+1)+'-'+p(kon.getDate());
        if(ks>u.zaciatok.slice(0,10))datum+=' – '+fmtD(ks);
      }
      return `<div style="display:flex;gap:12px;padding:8px 16px;border-top:1px solid #f2f4f9;font-size:13px">
        <span style="min-width:110px;font-weight:700;color:#1e40af;white-space:nowrap">${datum}</span>
        <span style="color:#1a2745">${escHtml(u.nazov||'')}</span></div>`;
    }).join('');
    document.getElementById('gcal_frame').outerHTML=html+'<div style="padding:8px 16px;font-size:11px;color:#9ca3af">synchronizované z kalendára oddelenia (~2 h interval)</div>';
    document.getElementById('gcal_card').style.display='';
  }catch(e){}
}
</script>
</body>
</html>
