<!doctype html><html lang="sk"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>TV režim – cievny.sk</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1e3d;color:#fff;padding:20px}
.box{background:#16264a;border:1px solid #2a3f66;border-radius:18px;padding:34px 30px;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.logo{font-size:34px;margin-bottom:6px}
h1{font-size:20px;margin:0 0 4px}
.sub{font-size:13px;color:#8fa3c8;margin-bottom:22px;line-height:1.5}
input{width:100%;padding:15px;border:1.5px solid #2a3f66;border-radius:11px;background:#0f1e3d;color:#fff;
  font-size:22px;text-align:center;letter-spacing:3px;font-family:inherit;outline:none;margin-bottom:14px}
input:focus{border-color:#3b82f6}
button{width:100%;padding:15px;border:none;border-radius:11px;background:#2563eb;color:#fff;font-size:17px;font-weight:700;cursor:pointer}
button:hover{background:#1d4fd8}
button:disabled{background:#3a4a6a;cursor:default}
.rem{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:#8fa3c8;margin-bottom:16px}
.msg{min-height:20px;font-size:14px;margin-top:14px}
.spin{font-size:15px;color:#8fa3c8}
</style>
</head>
<body>
<div class="box">
  <div class="logo">📺</div>
  <h1>TV režim oddelenia</h1>
  <div class="sub">Zadajte TV kód. Zobrazí sa denný program (len na čítanie, veľké písmo).</div>
  <div id="gate">
    <input id="code" type="password" inputmode="numeric" placeholder="TV kód" autocomplete="off"
      onkeydown="if(event.key==='Enter')prihlas()">
    <label class="rem"><input type="checkbox" id="rem" checked style="width:auto;margin:0;letter-spacing:normal"> Zapamätať na tomto zariadení (TV)</label>
    <button id="btn" onclick="prihlas()">Spustiť TV</button>
    <div class="msg" id="msg"></div>
  </div>
  <div id="loading" class="spin" style="display:none">Prihlasujem TV…</div>
</div>

<script>
const SB_URL='https://ncqtiicfqhaturjlfxcj.supabase.co';
const SB_ANON='sb_publishable_DX_FaXYGNx70dB6m-PfhAA_H5NHyH3k';
const TV_EMAIL='tv@cievny.sk';            // vyhradené konto pre TV (vytvorte ho v Supabase)
const KEY='cievny_auth', TK=KEY+'_at', RK=KEY+'_rt', XK=KEY+'_exp', EK=KEY+'_email';
const CODE_LS='cievny_tv_code';           // uložený kód (len na tomto zariadení)

function storeSession(d){
  sessionStorage.setItem(KEY,'1');
  sessionStorage.setItem(TK,d.access_token||'');
  sessionStorage.setItem(RK,d.refresh_token||'');
  sessionStorage.setItem(XK,String(Date.now()+((d.expires_in||3600)*1000)));
  if(d.user&&d.user.email)sessionStorage.setItem(EK,d.user.email);
  localStorage.setItem('cievny_tv_kiosk','1'); // Program vie, že je to TV kiosk (self-healing reload)
}

async function login(code){
  const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{
    method:'POST',headers:{'apikey':SB_ANON,'Content-Type':'application/json'},
    body:JSON.stringify({email:TV_EMAIL,password:code})});
  if(!r.ok)return false;
  storeSession(await r.json());
  return true;
}
function goProgram(){
  // TV pri sále: Program si uložil svoju sálu do localStorage – po reloade ju prilep späť do URL
  const sala=(localStorage.getItem('cievny_tv_sala')||'').toUpperCase();
  location.replace('/tools/Program/?tv=1'+(sala==='A'||sala==='B'?'&sala='+sala:''));
}

window.prihlas=async function(){
  const code=document.getElementById('code').value.trim();
  const msg=document.getElementById('msg');
  if(!code){msg.textContent='Zadajte TV kód.';msg.style.color='#fca5a5';return;}
  const btn=document.getElementById('btn');btn.disabled=true;
  msg.textContent='Prihlasujem…';msg.style.color='#8fa3c8';
  try{
    if(await login(code)){
      if(document.getElementById('rem').checked)localStorage.setItem(CODE_LS,code);
      else localStorage.removeItem(CODE_LS);
      goProgram();return;
    }
    msg.textContent='Nesprávny TV kód.';msg.style.color='#fca5a5';
  }catch(e){msg.textContent='Chyba siete – skúste znova.';msg.style.color='#fca5a5';}
  btn.disabled=false;
};

// Automatické spustenie: ak je kód uložený, prihlás sa a rovno spusti TV
(async function(){
  const saved=localStorage.getItem(CODE_LS);
  if(!saved)return;
  document.getElementById('gate').style.display='none';
  document.getElementById('loading').style.display='';
  try{ if(await login(saved)){goProgram();return;} }catch(e){}
  // uložený kód už neplatí → ukáž bránu
  document.getElementById('loading').style.display='none';
  document.getElementById('gate').style.display='';
  document.getElementById('msg').textContent='Uložený TV kód už neplatí – zadajte ho znova.';
  document.getElementById('msg').style.color='#fca5a5';
})();
</script>
</body></html>
