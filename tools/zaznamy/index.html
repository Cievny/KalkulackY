<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Záznamy – cievny.sk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f7;min-height:100vh;color:#1a2745;}
.wrap{max-width:1200px;margin:0 auto;padding:20px;}
h1{font-size:18px;font-weight:700;}
.page-sub{font-size:13px;color:#6b7280;margin:4px 0 16px;}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:#fff;border-radius:10px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px;}
.toolbar select,.toolbar input[type=text]{padding:7px 10px;border:1.5px solid #dde1ea;border-radius:7px;font-size:13px;font-family:inherit;outline:none;}
.toolbar input[type=text]{flex:1;min-width:160px;}
.toolbar label.chk{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;cursor:pointer;}
.btn{padding:7px 12px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-reload{background:#1e40af;color:#fff;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
th,td{text-align:left;padding:9px 12px;font-size:13px;border-bottom:1px solid #eef1f6;}
th{background:#f8faff;font-weight:700;color:#374151;font-size:12px;text-transform:uppercase;letter-spacing:.3px;}
tr.row:hover{background:#f8faff;cursor:pointer;}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;}
.tag-evk{background:#dbeafe;color:#1e40af;}
.tag-cas{background:#fef3c7;color:#b45309;}
.tag-pevar{background:#dcfce7;color:#166534;}
.tag-ras{background:#fae8ff;color:#86198f;}
.st-ok{color:#16a34a;font-weight:700;}
.st-miss{color:#dc2626;font-weight:700;}
.empty{text-align:center;padding:30px;color:#9ca3af;font-size:14px;}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;z-index:50;}
.overlay.show{display:flex;}
.modal{background:#fff;border-radius:12px;max-width:760px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.3);}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #eef1f6;position:sticky;top:0;background:#fff;border-radius:12px 12px 0 0;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#6b7280;line-height:1;}
.modal-body{padding:16px 20px;}
.fld{margin-bottom:10px;}
.fld label{display:block;font-size:11px;font-weight:700;color:#6b7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.2px;}
.fld input,.fld textarea{width:100%;padding:7px 9px;border:1.5px solid #dde1ea;border-radius:6px;font-size:13px;font-family:inherit;outline:none;color:#1a2745;}
.fld input:focus,.fld textarea:focus{border-color:#3b82f6;}
.fld textarea{resize:vertical;min-height:38px;}
.fld.changed input,.fld.changed textarea{border-color:#f59e0b;background:#fffbeb;}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid #eef1f6;position:sticky;bottom:0;background:#fff;border-radius:0 0 12px 12px;}
.btn-save{background:#16a34a;color:#fff;}
.btn-cancel{background:#f0f2f7;color:#374151;}
.btn-del{background:#fff;color:#dc2626;border:1.5px solid #fca5a5;margin-right:auto;}
.edit-form-btn{background:#1e40af;color:#fff;border:none;border-radius:4px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:600;margin-right:4px}
.edit-form-btn:hover{background:#1737a0}
.raw-btn{background:none;border:1px solid #d1d5db;border-radius:4px;padding:3px 6px;font-size:11px;cursor:pointer;color:#6b7280}
.raw-btn:hover{background:#f3f4f6}

.msg{font-size:13px;font-weight:600;align-self:center;margin-right:auto;}
.chip-star{border:1.5px solid #facc15;border-radius:20px;background:#fefce8;color:#a16207;padding:6px 12px;}
.star-card{background:#fff;border-radius:10px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:10px;border-left:4px solid #facc15;}
.star-note{background:#fefce8;border:1px solid #fde68a;border-radius:7px;padding:8px 10px;font-size:13.5px;font-weight:600;color:#713f12;margin-top:8px;white-space:pre-wrap;}
.star-meta{font-size:12px;color:#6b7280;display:flex;gap:12px;flex-wrap:wrap;margin-top:6px;}
.star-btn{background:none;border:1px solid #d1d5db;border-radius:5px;padding:4px 9px;font-size:13px;cursor:pointer;color:#374151;}
.star-btn:hover{background:#f3f4f6;}
.sec-hdr{grid-column:1/-1;font-size:11px;font-weight:800;color:#1e40af;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px;border-top:1px solid #eef1f6;padding-top:10px;}
@media(max-width:700px){
.wrap{padding:12px;}
.toolbar{flex-direction:column;align-items:stretch;}
.toolbar select,.toolbar input[type=text]{width:100%;min-width:0;padding:10px;}
.toolbar .btn-reload{width:100%;padding:10px;}
table{min-width:560px;}
.edit-form-btn,.raw-btn{padding:8px 12px;font-size:12px;}
}
</style>
</head>
<body>
<script src="/tools/auth.js"></script>
<script>checkAuth();</script>

<div class="wrap">
  <h1>📁 Záznamy výkonov</h1>
  <p class="page-sub">Vyhľadanie a dodatočná editácia výkonov (napr. doplnenie komplikácií).</p>

  <div class="toolbar">
    <select id="f_tool" onchange="render()">
      <option value="">Všetky nástroje</option>
      <option value="evk">EVK</option>
      <option value="cas">CAS</option>
      <option value="pevar">PEVAR</option>
      <option value="ras">RAS</option>
    </select>
    <input type="text" id="f_search" placeholder="Hľadať ID / operatéra..." oninput="render()">
    <label class="chk"><input type="checkbox" id="f_miss" onchange="render()"> Len nedoplnené komplikácie</label>
    <label class="chk chip-star"><input type="checkbox" id="f_star" onchange="render()"> ⭐ Zaujímaví</label>
    <button class="btn btn-reload" onclick="loadAll()">↻ Načítať</button>
  </div>

  <div id="star_msg" style="display:none;background:#fef2f2;color:#b45309;font-weight:600;font-size:13px;padding:8px 12px;border-radius:8px;margin-bottom:10px"></div>
  <div id="star_wrap" style="display:none"><div id="star_list"></div></div>
  <div id="tbl_wrap" style="overflow-x:auto;-webkit-overflow-scrolling:touch">
  <table>
    <thead><tr><th>Nástroj</th><th>ID výkonu</th><th>Dátum</th><th>Operatér</th><th>Komplikácie</th><th>Akcie</th></tr></thead>
    <tbody id="tbody"><tr><td colspan="6" class="empty">Načítavam…</td></tr></tbody>
  </table>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="m_title">Záznam</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="m_body"></div>
    <div class="modal-foot">
      <button class="btn btn-del" onclick="delRecord()">🗑 Zmazať</button>
      <span class="msg" id="m_msg"></span>
      <button class="btn btn-cancel" onclick="closeModal()">Zrušiť</button>
      <button class="btn btn-save" onclick="saveRecord()">💾 Uložiť zmeny</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://ncqtiicfqhaturjlfxcj.supabase.co';
const SB_KEY='sb_publishable_DX_FaXYGNx70dB6m-PfhAA_H5NHyH3k';
const SB_HEAD=()=>({'apikey':SB_KEY,'Authorization':'Bearer '+sbToken(),'Content-Type':'application/json'});
const TABLES={evk:'evk_vykony',cas:'cas_vykony',pevar:'pevar_vykony',ras:'ras_vykony'};
const TOOL_LABEL={evk:'EVK',cas:'CAS',pevar:'PEVAR',ras:'RAS'};
// stĺpce, ktoré sa needitujú
const READONLY=['id','created_at'];
// stĺpce súvisiace s komplikáciami (pre status + zvýraznenie sekcie)
const COMPL_KEYS=['komplikacie','komplikacie_struct','clavien_dindo','konverzia','tech_uspech'];

let ROWS=[];
let LOAD_ERR=false; // aspoň jedna tabuľka sa nenačítala (výpadok ≠ prázdna DB)
let CURRENT=null; // {tool, table, data}
const STAR_TABLE='zaujimavi_pacienti';
let STARS=[];      // ⭐ zaujímaví pacienti
let STAR_ERR='';

function escHtml(t){return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// stránkovanie: načítaj VŠETKY riadky po 1000 (url bez limit/offset)
async function fetchAllRows(url){
  let all=[],offset=0;
  const sep=url.includes('?')?'&':'?';
  while(true){
    const r=await fetch(url+sep+'limit=1000&offset='+offset,{headers:SB_HEAD()});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const chunk=await r.json();
    all=all.concat(chunk);
    if(chunk.length<1000)break;
    offset+=1000;
  }
  return all;
}

async function loadAll(){
  document.getElementById('tbody').innerHTML='<tr><td colspan="6" class="empty">Načítavam…</td></tr>';
  ROWS=[];LOAD_ERR=false;
  for(const [tool,table] of Object.entries(TABLES)){
    try{
      const arr=await fetchAllRows(`${SB_URL}/rest/v1/${table}?order=created_at.desc`);
      arr.forEach(d=>ROWS.push({tool,table,data:d}));
    }catch(e){LOAD_ERR=true;}
  }
  STARS=[];STAR_ERR='';
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${STAR_TABLE}?order=created_at.desc&limit=1000`,{headers:SB_HEAD()});
    if(r.ok)STARS=await r.json();
    else STAR_ERR=(r.status===404||r.status===400)?'⚠️ Spustite SQL (tabuľka zaujimavi_pacienti)':'⚠️ Zaujímaví pacienti: chyba '+r.status;
  }catch(e){STAR_ERR='⚠️ Zaujímaví pacienti: chyba siete';}
  // zoradiť spolu podľa created_at desc
  ROWS.sort((a,b)=>String(b.data.created_at||'').localeCompare(String(a.data.created_at||'')));
  render();
}

function hasCompl(d){
  return COMPL_KEYS.some(k=>{const v=d[k];return v!==null&&v!==undefined&&v!==''&&v!==false;});
}

function render(){
  starMsg(STAR_ERR);
  const starMode=document.getElementById('f_star').checked;
  document.getElementById('tbl_wrap').style.display=starMode?'none':'';
  document.getElementById('star_wrap').style.display=starMode?'':'none';
  if(starMode){renderStars();return;}
  const starSet=new Set(STARS.map(s=>s.vykon_id));
  const ft=document.getElementById('f_tool').value;
  const fs=document.getElementById('f_search').value.trim().toLowerCase();
  const fm=document.getElementById('f_miss').checked;
  const rows=ROWS.filter(r=>{
    if(ft&&r.tool!==ft)return false;
    if(fm&&hasCompl(r.data))return false;
    if(fs){
      const hay=((r.data.vykon_id||'')+' '+(r.data.operator||'')).toLowerCase();
      if(!hay.includes(fs))return false;
    }
    return true;
  });
  const tb=document.getElementById('tbody');
  const errRow='<tr><td colspan="6" style="text-align:center;padding:14px;background:#fef2f2;color:#dc2626;font-weight:700">⚠️ Chyba spojenia — skúste obnoviť stránku</td></tr>';
  if(!rows.length){tb.innerHTML=LOAD_ERR?errRow:'<tr><td colspan="6" class="empty">Žiadne záznamy.</td></tr>';return;}
  tb.innerHTML=LOAD_ERR?errRow:'';
  rows.forEach((r,i)=>{
    const d=r.data;
    const datum=d.datum||d.datum_zaznamu||(d.created_at?d.created_at.slice(0,10):'');
    const ok=hasCompl(d);
    const tr=document.createElement('tr');
    tr.className='row';
    const toolKey=r.tool.toUpperCase();
    tr.onclick=()=>openInForm(toolKey,d);
    tr.innerHTML=`<td><span class="tag tag-${r.tool}">${TOOL_LABEL[r.tool]}</span></td>
      <td>${starSet.has(d.vykon_id)?'<span title="⭐ zaujímavý pacient">⭐ </span>':''}${escHtml(d.vykon_id||'—')}</td>
      <td>${escHtml(datum)}</td>
      <td>${escHtml(d.operator||'—')}</td>
      <td>${ok?'<span class="st-ok">✅ doplnené</span>':'<span class="st-miss">⚠️ chýba</span>'}</td>
      <td><button class="edit-form-btn">📝 Otvoriť formulár</button><button class="raw-btn" title="Surové polia DB">⚙️</button></td>`;
    tb.appendChild(tr);
    tr.querySelector('.edit-form-btn').addEventListener('click',e=>{e.stopPropagation();openInForm(toolKey,d);});
    tr.querySelector('.raw-btn').addEventListener('click',e=>{e.stopPropagation();openModal(r);});
  });
}

function openModal(r){
  CURRENT=r;
  const d=r.data;
  document.getElementById('m_title').textContent=`${TOOL_LABEL[r.tool]} · ${d.vykon_id||d.id.slice(0,8)}`;
  const body=document.getElementById('m_body');
  body.innerHTML='';
  document.getElementById('m_msg').textContent='';
  // komplikácie sekcia hore, zvyšok dole
  const keys=Object.keys(d).filter(k=>!READONLY.includes(k));
  const complFirst=keys.filter(k=>COMPL_KEYS.includes(k));
  const rest=keys.filter(k=>!COMPL_KEYS.includes(k));
  const addHdr=(t)=>{const h=document.createElement('div');h.className='sec-hdr';h.textContent=t;body.appendChild(h);};
  addHdr('⚠️ Komplikácie / výsledok');
  complFirst.forEach(k=>body.appendChild(fldEl(k,d[k])));
  addHdr('Ostatné polia záznamu');
  rest.forEach(k=>body.appendChild(fldEl(k,d[k])));
  document.getElementById('overlay').classList.add('show');
}

function fldEl(key,val){
  const wrap=document.createElement('div');
  wrap.className='fld';wrap.dataset.key=key;
  const isObj=val!==null&&typeof val==='object';
  if(isObj){val=JSON.stringify(val);wrap.dataset.json='1';}
  const long=typeof val==='string'&&(val.length>60||val.includes('\n')||val.startsWith('{')||val.startsWith('['));
  const inputHtml=long
    ?`<textarea data-orig="${escHtml(val)}">${escHtml(val)}</textarea>`
    :`<input type="text" data-orig="${escHtml(val)}" value="${escHtml(val)}">`;
  wrap.innerHTML=`<label>${escHtml(key)}</label>${inputHtml}`;
  const inp=wrap.querySelector('input,textarea');
  inp.addEventListener('input',()=>{wrap.classList.toggle('changed',inp.value!==(inp.dataset.orig||''));});
  return wrap;
}

function collectChanges(){
  const changes={};
  document.querySelectorAll('#m_body .fld').forEach(wrap=>{
    const inp=wrap.querySelector('input,textarea');
    const orig=inp.dataset.orig||'';
    if(inp.value!==orig){
      let v=inp.value;
      if(wrap.dataset.json){ // jsonb pole – uložiť len ak je platný JSON
        if(v==='')v=null;
        else{try{v=JSON.parse(v);}catch(e){return;}}
      }
      else if(v==='')v=null;                                   // prázdne → NULL
      else if(v==='true')v=true; else if(v==='false')v=false; // boolean
      changes[wrap.dataset.key]=v;
    }
  });
  return changes;
}

async function saveRecord(){
  if(!CURRENT)return;
  const changes=collectChanges();
  const keys=Object.keys(changes);
  if(!keys.length){msg('Žiadne zmeny.','#6b7280');return;}
  msg('Ukladám…','#3b82f6');
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${CURRENT.table}?id=eq.${CURRENT.data.id}`,
      {method:'PATCH',headers:{...SB_HEAD(),'Prefer':'return=minimal'},body:JSON.stringify(changes)});
    if(r.ok){
      Object.assign(CURRENT.data,changes);
      msg('✅ Uložené ('+keys.length+' polí)','#16a34a');
      render();
      setTimeout(closeModal,800);
    }else{msg('Chyba '+r.status,'#dc2626');}
  }catch(e){msg('Chyba siete: '+e.message,'#dc2626');}
}

async function delRecord(){
  if(!CURRENT)return;
  if(!confirm('Naozaj zmazať tento záznam? Túto akciu nie je možné vrátiť.'))return;
  msg('Mažem…','#dc2626');
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${CURRENT.table}?id=eq.${CURRENT.data.id}`,{method:'DELETE',headers:SB_HEAD()});
    if(r.ok){ROWS=ROWS.filter(x=>x.data.id!==CURRENT.data.id);render();closeModal();}
    else msg('Chyba '+r.status,'#dc2626');
  }catch(e){msg('Chyba siete: '+e.message,'#dc2626');}
}

function msg(t,c){const el=document.getElementById('m_msg');el.style.color=c;el.textContent=t;}
function closeModal(){document.getElementById('overlay').classList.remove('show');CURRENT=null;}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

function openInForm(tool,record){
  sessionStorage.setItem('cievny_edit',JSON.stringify({tool,record}));
  const urls={EVK:'/tools/EVK/',CAS:'/tools/CAS-generator/',PEVAR:'/tools/PEVAR/'};
  window.location.href=urls[tool]||'/tools/EVK/';
}

// ── ⭐ Zaujímaví pacienti ─────────────────────────────────────────────────────
function starMsg(t){const el=document.getElementById('star_msg');el.textContent=t||'';el.style.display=t?'':'none';}
function renderStars(){
  const ft=document.getElementById('f_tool').value;
  const fs=document.getElementById('f_search').value.trim().toLowerCase();
  const list=document.getElementById('star_list');
  const items=STARS.filter(s=>{
    if(ft&&String(s.tool||'').toLowerCase()!==ft)return false;
    if(fs){const hay=((s.vykon_id||'')+' '+(s.popis||'')+' '+(s.poznamka||'')).toLowerCase();if(!hay.includes(fs))return false;}
    return true;
  });
  list.innerHTML='';
  if(!items.length){const e=document.createElement('div');e.className='empty';e.textContent=STAR_ERR?'':'Žiadni zaujímaví pacienti.';list.appendChild(e);return;}
  items.forEach(s=>{
    const rec=s.vykon_id?ROWS.find(r=>(r.data.vykon_id||'')===s.vykon_id):null;
    const datum=rec?(rec.data.datum||rec.data.datum_zaznamu||(rec.data.created_at||'').slice(0,10)):(s.created_at||'').slice(0,10);
    const toolLc=String(s.tool||'').toLowerCase();
    const card=document.createElement('div');card.className='star-card';
    card.innerHTML=`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span class="tag tag-${escHtml(toolLc)}">${escHtml(s.tool||'?')}</span>
      <strong>⭐ ${escHtml(s.vykon_id||'—')}</strong>
      <span style="font-size:12px;color:#6b7280">${escHtml(datum)}</span>
      <span style="flex:1"></span>
      <button class="star-btn" data-act="edit" title="Upraviť poznámku">✏️</button>
      <button class="star-btn" data-act="del" style="color:#dc2626;border-color:#fca5a5" title="Odstrániť ⭐">✕</button>
    </div>`
    +(s.popis?`<div style="font-size:12.5px;color:#374151;margin-top:6px">${escHtml(s.popis)}</div>`:'')
    +`<div class="star-note">📝 ${escHtml(s.poznamka||'(bez poznámky)')}</div>
    <div class="star-meta">${s.created_by?'<span>👤 '+escHtml(s.created_by)+'</span>':''}${rec?'':'<span style="color:#b45309">⚠️ výkon sa už nenachádza v databáze</span>'}</div>`;
    card.querySelector('[data-act="edit"]').addEventListener('click',e=>{e.stopPropagation();editStar(s);});
    card.querySelector('[data-act="del"]').addEventListener('click',e=>{e.stopPropagation();delStar(s);});
    if(rec){card.style.cursor='pointer';card.addEventListener('click',e=>{if(e.target.closest('.star-btn'))return;openInForm(rec.tool.toUpperCase(),rec.data);});}
    list.appendChild(card);
  });
}
async function editStar(s){
  const note=prompt('Poznámka – prečo je pacient zaujímavý:',s.poznamka||'');
  if(note===null)return;
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${STAR_TABLE}?id=eq.${s.id}`,{method:'PATCH',headers:{...SB_HEAD(),'Prefer':'return=minimal'},body:JSON.stringify({poznamka:note})});
    if(r.ok){s.poznamka=note;render();}
    else starMsg('⚠️ Chyba uloženia poznámky ('+r.status+')');
  }catch(e){starMsg('⚠️ Chyba siete: '+e.message);}
}
async function delStar(s){
  if(!confirm('Odstrániť označenie ⭐ pre '+(s.vykon_id||'')+'?'))return;
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${STAR_TABLE}?id=eq.${s.id}`,{method:'DELETE',headers:SB_HEAD()});
    if(r.ok){STARS=STARS.filter(x=>x.id!==s.id);render();}
    else starMsg('⚠️ Chyba mazania ('+r.status+')');
  }catch(e){starMsg('⚠️ Chyba siete: '+e.message);}
}

// deep-link ?q= (napr. z /tools/kontroly/) – predvyplní vyhľadávanie, render() ho aplikuje
(function(){
  const q=new URLSearchParams(location.search).get('q');
  if(q)document.getElementById('f_search').value=q;
})();

loadAll();
</script>
</body>
</html>
