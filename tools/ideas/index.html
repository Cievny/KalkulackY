<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Nápady & Požiadavky – cievny.sk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f7;min-height:100vh;}
.board{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:16px 20px 20px;max-width:1200px;margin:0 auto;}
.col{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;flex-direction:column;gap:10px;}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.col-title{font-size:14px;font-weight:700;letter-spacing:.3px;}
.col-count{font-size:11px;font-weight:600;background:#f0f2f7;color:#6b7280;border-radius:10px;padding:2px 8px;}
.col-napady .col-title{color:#1e40af;}
.col-riesenie .col-title{color:#b45309;}
.col-hotovo .col-title{color:#166534;}
.col-napady{border-top:3px solid #3b82f6;}
.col-riesenie{border-top:3px solid #f59e0b;}
.col-hotovo{border-top:3px solid #22c55e;}
.card{background:#f8faff;border:1.5px solid #e5e9f5;border-radius:8px;padding:10px 12px;position:relative;cursor:default;}
.card-text{font-size:13px;color:#1a2745;line-height:1.5;white-space:pre-wrap;word-break:break-word;}
.card-meta{font-size:10px;color:#9ca3af;margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.card-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.btn-move{font-size:11px;font-weight:600;padding:3px 8px;border:1.5px solid #dde1ea;border-radius:5px;background:#fff;cursor:pointer;color:#374151;}
.btn-move:hover{background:#f0f2f7;}
.btn-del{font-size:11px;font-weight:600;padding:3px 8px;border:1.5px solid #fca5a5;border-radius:5px;background:#fff;cursor:pointer;color:#dc2626;}
.btn-del:hover{background:#fef2f2;}
.btn-note{font-size:11px;font-weight:600;padding:3px 8px;border:1.5px solid #fcd34d;border-radius:5px;background:#fff;cursor:pointer;color:#b45309;}
.btn-note:hover{background:#fffbeb;}
.card-note{font-size:12px;color:#78350f;background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 6px 6px 0;padding:6px 9px;margin-top:6px;white-space:pre-wrap;word-break:break-word;line-height:1.45;}
.add-area{margin-top:4px;}
.add-area textarea{width:100%;padding:8px 10px;border:1.5px solid #dde1ea;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;min-height:60px;outline:none;color:#1a2745;}
.add-area textarea:focus{border-color:#3b82f6;}
.add-opts{display:flex;gap:6px;margin-top:6px;}
.add-opts select{flex:1;padding:6px 8px;border:1.5px solid #dde1ea;border-radius:7px;font-size:12px;font-family:inherit;color:#374151;outline:none;background:#fff;min-width:0;}
.btn-add{margin-top:6px;width:100%;padding:7px;background:#1e40af;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-add:hover{background:#1737a0;}
.kat-badge{font-size:9.5px;font-weight:700;padding:1px 7px;border-radius:8px;letter-spacing:.3px;}
.kat-apka{background:#dbeafe;color:#1e40af;}
.kat-oddelenie{background:#dcfce7;color:#166534;}
.author{font-weight:600;color:#6b7280;}
.btn-vote{font-size:11px;font-weight:700;padding:3px 9px;border:1.5px solid #bfdbfe;border-radius:12px;background:#fff;cursor:pointer;color:#1e40af;}
.btn-vote:hover{background:#eff6ff;}
.btn-vote.voted{background:#dbeafe;cursor:default;}
.btn-kom{font-size:11px;font-weight:600;padding:3px 8px;border:1.5px solid #dde1ea;border-radius:5px;background:#fff;cursor:pointer;color:#374151;}
.kom-box{margin-top:8px;border-top:1.5px solid #e5e9f5;padding-top:7px;}
.kom{font-size:12px;color:#374151;background:#fff;border:1px solid #eef0f5;border-radius:6px;padding:5px 8px;margin-bottom:5px;line-height:1.4;white-space:pre-wrap;word-break:break-word;}
.kom .kwho{font-size:10px;color:#9ca3af;font-weight:600;}
.kom-add{display:flex;gap:5px;align-items:center;}
.kom-add input[type=text]{flex:1;padding:6px 8px;border:1.5px solid #dde1ea;border-radius:6px;font-size:12px;font-family:inherit;outline:none;min-width:0;}
.kom-add label{font-size:11px;color:#6b7280;display:flex;align-items:center;gap:3px;white-space:nowrap;cursor:pointer;}
.kom-add button{padding:6px 10px;background:#1e40af;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;}
.filters{display:flex;gap:8px;padding:12px 20px 0;flex-wrap:wrap;max-width:1200px;margin:0 auto;}
.fbtn{padding:7px 14px;border:1.5px solid #dde1ea;border-radius:8px;background:#fff;font-size:12.5px;font-weight:600;color:#374151;cursor:pointer;}
.fbtn.active{background:#1e40af;color:#fff;border-color:#1e40af;}
h1{font-size:18px;font-weight:700;color:#1a2745;padding:20px 20px 0;max-width:1200px;margin:0 auto;}
.page-sub{font-size:13px;color:#6b7280;padding:4px 20px 0;max-width:1200px;margin:0 auto;}
.arch-wrap{max-width:1200px;margin:0 auto;padding:0 20px 24px;}
.arch-wrap details{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:14px 16px;}
.arch-wrap summary{font-size:13.5px;font-weight:700;color:#1a2745;cursor:pointer;user-select:none;}
.arch-card{background:#f8faff;border:1.5px solid #e5e9f5;border-radius:8px;padding:8px 11px;margin-top:8px;font-size:12.5px;color:#4b5563;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.arch-card .atext{flex:1;min-width:180px;white-space:pre-wrap;word-break:break-word;}
@media(max-width:700px){.board{grid-template-columns:1fr;}}
</style>
</head>
<body>
<script src="/tools/auth.js"></script>
<script>checkAuth();</script>

<h1>💡 Nápady, návrhy & požiadavky</h1>
<p class="page-sub">Návrhy na apku aj na fungovanie oddelenia. Príspevok môžete podpísať, alebo poslať anonymne.</p>

<div class="filters">
  <button class="fbtn active" onclick="setFilter('',this)">Všetko</button>
  <button class="fbtn" onclick="setFilter('apka',this)">💻 Apka / systém</button>
  <button class="fbtn" onclick="setFilter('oddelenie',this)">🏥 Oddelenie / prevádzka</button>
</div>

<div class="board">
  <div class="col col-napady" id="col-napady">
    <div class="col-header">
      <span class="col-title">💡 Nápady & požiadavky</span>
      <span class="col-count" id="cnt-napady">0</span>
    </div>
    <div id="cards-napady"></div>
    <div class="add-area">
      <textarea id="inp-napady" placeholder="Napíš nápad, návrh alebo požiadavku..."></textarea>
      <div class="add-opts">
        <select id="kat-napady"><option value="apka">💻 Apka / systém</option><option value="oddelenie">🏥 Oddelenie</option></select>
        <select id="pod-napady"><option value="meno">👤 S podpisom</option><option value="anonym">🕶 Anonymne</option></select>
      </div>
      <button class="btn-add" onclick="addCard('napady')">+ Pridať</button>
    </div>
  </div>

  <div class="col col-riesenie" id="col-riesenie">
    <div class="col-header">
      <span class="col-title">🔧 V riešení</span>
      <span class="col-count" id="cnt-riesenie">0</span>
    </div>
    <div id="cards-riesenie"></div>
    <div class="add-area">
      <textarea id="inp-riesenie" placeholder="Čo sa práve rieši..."></textarea>
      <div class="add-opts">
        <select id="kat-riesenie"><option value="apka">💻 Apka / systém</option><option value="oddelenie">🏥 Oddelenie</option></select>
        <select id="pod-riesenie"><option value="meno">👤 S podpisom</option><option value="anonym">🕶 Anonymne</option></select>
      </div>
      <button class="btn-add" onclick="addCard('riesenie')">+ Pridať</button>
    </div>
  </div>

  <div class="col col-hotovo" id="col-hotovo">
    <div class="col-header">
      <span class="col-title">✅ Hotovo</span>
      <span class="col-count" id="cnt-hotovo">0</span>
    </div>
    <div id="cards-hotovo"></div>
    <div class="add-area">
      <textarea id="inp-hotovo" placeholder="Dokončená úprava..."></textarea>
      <div class="add-opts">
        <select id="kat-hotovo"><option value="apka">💻 Apka / systém</option><option value="oddelenie">🏥 Oddelenie</option></select>
        <select id="pod-hotovo"><option value="meno">👤 S podpisom</option><option value="anonym">🕶 Anonymne</option></select>
      </div>
      <button class="btn-add" onclick="addCard('hotovo')">+ Pridať</button>
    </div>
  </div>
</div>

<div class="arch-wrap">
  <details>
    <summary>🗄 Archív – <span id="cnt-archiv">0</span></summary>
    <div id="cards-archiv"></div>
  </details>
</div>

<script>
const SB_URL='https://ncqtiicfqhaturjlfxcj.supabase.co';
const SB_KEY='sb_publishable_DX_FaXYGNx70dB6m-PfhAA_H5NHyH3k';
const SB_HEAD=()=>({'apikey':SB_KEY,'Authorization':'Bearer '+sbToken(),'Content-Type':'application/json'});
const TBL='ideas';

const COLS=['napady','riesenie','hotovo'];
const COL_LABELS={napady:'💡 Nápady',riesenie:'🔧 V riešení',hotovo:'✅ Hotovo'};
let ITEMS=[];
let FILTER='';
const KOMOPEN=new Set(); // rozbalené komentáre prežijú prerender

function escHtml(t){return (t==null?'':''+t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function myName(){const e=(typeof sbUserEmail==='function'?sbUserEmail():'')||'';return e.split('@')[0];}

function setFilter(f,btn){
  FILTER=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

async function loadItems(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${TBL}?order=created_at.desc&limit=500`,{headers:SB_HEAD()});
    ITEMS=r.ok?await r.json():[];
  }catch{ITEMS=[];}
  render();
}

function parseKom(item){try{const k=JSON.parse(item.komentare||'[]');return Array.isArray(k)?k:[];}catch(e){return[];}}
// čerstvé prečítanie jednej karty tesne pred zápisom (bráni prepísaniu cudzieho hlasu/komentára)
async function fetchOne(id){
  const r=await fetch(`${SB_URL}/rest/v1/${TBL}?id=eq.${id}&select=hlasy,komentare&limit=1`,{headers:SB_HEAD()});
  if(!r.ok)return null;const a=await r.json();return a[0]||null;
}
// automatické obnovenie nástenky (pauza kým používateľ píše do niektorého poľa)
setInterval(()=>{if(document.activeElement&&/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName))return;loadItems();},60000);

function render(){
  COLS.forEach(col=>{
    const container=document.getElementById('cards-'+col);
    const colItems=ITEMS.filter(i=>i.col===col&&(!FILTER||(i.kategoria||'apka')===FILTER))
      .sort((a,b)=>(b.hlasy||0)-(a.hlasy||0)||(b.created_at||'').localeCompare(a.created_at||''));
    document.getElementById('cnt-'+col).textContent=colItems.length;
    container.innerHTML='';
    colItems.forEach(item=>{
      const div=document.createElement('div');
      div.className='card';
      const date=new Date(item.created_at).toLocaleDateString('sk-SK',{day:'numeric',month:'short',year:'numeric'});
      const moveButtons=COLS.filter(c=>c!==col).map(c=>`<button class="btn-move" onclick="moveCard('${item.id}','${c}')">${COL_LABELS[c]}</button>`).join('');
      const noteHtml=item.note?`<div class="card-note">📝 ${escHtml(item.note)}</div>`:'';
      const kat=(item.kategoria==='oddelenie'?'oddelenie':'apka');
      const katBadge=`<span class="kat-badge kat-${kat}">${kat==='oddelenie'?'🏥 oddelenie':'💻 apka'}</span>`;
      const who=item.author?`<span class="author">👤 ${escHtml(item.author)}</span>`:`<span class="author">🕶 anonym</span>`;
      const voted=!!localStorage.getItem('idea_v_'+item.id);
      const kom=parseKom(item);
      const komOpen=KOMOPEN.has(item.id);
      const komHtml=`<div class="kom-box" id="kom_${item.id}" style="display:${komOpen?'block':'none'}">
        ${kom.map(k=>`<div class="kom">${escHtml(k.t)}<div class="kwho">${k.a?'👤 '+escHtml(k.a):'🕶 anonym'} · ${escHtml(k.d||'')}</div></div>`).join('')}
        <div class="kom-add">
          <input type="text" id="kin_${item.id}" placeholder="Napíš komentár…" onkeydown="if(event.key==='Enter')addKoment('${item.id}')">
          <label title="poslať anonymne"><input type="checkbox" id="kan_${item.id}">🕶</label>
          <button onclick="addKoment('${item.id}')">➤</button>
        </div>
      </div>`;
      div.innerHTML=`<div class="card-text">${escHtml(item.text)}</div>
        ${noteHtml}
        <div class="card-meta">${katBadge}${who}<span>${date}</span></div>
        <div class="card-actions">
          <button class="btn-vote${voted?' voted':''}" onclick="vote('${item.id}')" title="${voted?'už ste hlasovali':'podporiť návrh'}">👍 ${item.hlasy||0}</button>
          <button class="btn-kom" onclick="toggleKom('${item.id}')">💬 ${kom.length}</button>
          ${moveButtons}<button class="btn-note" onclick="saveNote('${item.id}')">📝 ${item.note?'Upraviť':'Pridať'} poznámku</button><button class="btn-move" onclick="moveCard('${item.id}','archiv')">🗄 Archivovať</button><button class="btn-del" onclick="delCard('${item.id}')">🗑 Zmazať</button></div>
        ${komHtml}`;
      container.appendChild(div);
    });
  });
  renderArchiv();
}

function renderArchiv(){
  const rows=ITEMS.filter(i=>i.col==='archiv'&&(!FILTER||(i.kategoria||'apka')===FILTER))
    .sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
  document.getElementById('cnt-archiv').textContent=rows.length;
  const box=document.getElementById('cards-archiv');box.innerHTML='';
  if(!rows.length){box.innerHTML='<div style="font-size:12px;color:#9ca3af;margin-top:8px">Archív je prázdny.</div>';return;}
  rows.forEach(item=>{
    const kat=(item.kategoria==='oddelenie'?'oddelenie':'apka');
    const date=new Date(item.created_at).toLocaleDateString('sk-SK');
    const div=document.createElement('div');div.className='arch-card';
    div.innerHTML=`<span class="kat-badge kat-${kat}">${kat==='oddelenie'?'🏥':'💻'}</span>
      <span class="atext">${escHtml(item.text)}${item.note?' — 📝 '+escHtml(item.note):''}</span>
      <span style="color:#9ca3af;font-size:11px">${item.author?'👤 '+escHtml(item.author):'🕶 anonym'} · ${date} · 👍 ${item.hlasy||0}</span>
      <button class="btn-move" onclick="moveCard('${item.id}','hotovo')">↩ Obnoviť</button>
      <button class="btn-del" onclick="delCard('${item.id}')">🗑</button>`;
    box.appendChild(div);
  });
}

async function vote(id){
  if(localStorage.getItem('idea_v_'+id))return;
  try{
    // optimistická súbežnosť: PATCH prejde len ak hlasy medzitým nikto nezmenil; inak refetch + 1 opakovanie
    for(let pokus=0;pokus<2;pokus++){
      const cur=await fetchOne(id);if(!cur)return;
      const old=cur.hlasy||0;
      const cond=cur.hlasy==null?'&hlasy=is.null':'&hlasy=eq.'+old;
      const r=await fetch(`${SB_URL}/rest/v1/${TBL}?id=eq.${id}${cond}`,{method:'PATCH',headers:{...SB_HEAD(),'Prefer':'return=representation'},body:JSON.stringify({hlasy:old+1})});
      if(!r.ok){alert('Chyba pri hlasovaní: '+r.status);return;}
      const res=await r.json();
      if(res.length){localStorage.setItem('idea_v_'+id,'1');await loadItems();return;}
    }
    alert('Hlas sa nepodarilo uložiť – kartu medzitým niekto zmenil. Skúste znova.');
    await loadItems();
  }catch(e){alert('Chyba siete: '+e.message);}
}

function toggleKom(id){
  if(KOMOPEN.has(id))KOMOPEN.delete(id);else KOMOPEN.add(id);
  const el=document.getElementById('kom_'+id);
  if(el)el.style.display=KOMOPEN.has(id)?'block':'none';
}

async function addKoment(id){
  const inp=document.getElementById('kin_'+id);
  const t=(inp.value||'').trim();if(!t)return;
  const anon=document.getElementById('kan_'+id).checked;
  try{
    // optimistická súbežnosť: PATCH prejde len ak komentáre medzitým nikto nezmenil; inak refetch + 1 opakovanie
    for(let pokus=0;pokus<2;pokus++){
      const cur=await fetchOne(id);if(!cur)return;
      const kom=parseKom(cur);
      kom.push({t,a:anon?null:(myName()||null),d:new Date().toLocaleDateString('sk-SK')});
      const cond=cur.komentare==null?'&komentare=is.null':'&komentare=eq.'+encodeURIComponent(cur.komentare);
      const r=await fetch(`${SB_URL}/rest/v1/${TBL}?id=eq.${id}${cond}`,{method:'PATCH',headers:{...SB_HEAD(),'Prefer':'return=representation'},body:JSON.stringify({komentare:JSON.stringify(kom)})});
      if(!r.ok){alert('Chyba pri ukladaní: '+r.status);return;}
      const res=await r.json();
      if(res.length){KOMOPEN.add(id);inp.value='';await loadItems();return;}
    }
    alert('Komentár sa nepodarilo uložiť – kartu medzitým niekto zmenil. Skúste znova.');
    await loadItems();
  }catch(e){alert('Chyba siete: '+e.message);}
}

async function addCard(col){
  const inp=document.getElementById('inp-'+col);
  const text=inp.value.trim();
  if(!text)return;
  const kategoria=document.getElementById('kat-'+col).value;
  const anonym=document.getElementById('pod-'+col).value==='anonym';
  let author=null;
  if(!anonym){
    author=myName();
    if(!author){author=(prompt('Vaše meno (podpis):','')||'').trim()||null;}
  }
  const body={col,text,kategoria,author};
  if(anonym)body.created_by=null; // prepíše automatický email z databázy – anonymita platí naozaj
  inp.disabled=true;
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${TBL}`,{method:'POST',headers:{...SB_HEAD(),'Prefer':'return=minimal'},body:JSON.stringify(body)});
    if(r.ok){inp.value='';await loadItems();}
    else alert('Chyba pri ukladaní: '+r.status);
  }catch(e){alert('Chyba siete: '+e.message);}
  inp.disabled=false;inp.focus();
}

async function moveCard(id,newCol){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${TBL}?id=eq.${id}`,{method:'PATCH',headers:{...SB_HEAD(),'Prefer':'return=minimal'},body:JSON.stringify({col:newCol})});
    if(r.ok)await loadItems();
  }catch(e){alert('Chyba siete: '+e.message);}
}

async function saveNote(id){
  const item=ITEMS.find(i=>i.id===id);
  const note=prompt('Poznámka k nápadu:',item&&item.note?item.note:'');
  if(note===null)return; // zrušené
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${TBL}?id=eq.${id}`,{method:'PATCH',headers:{...SB_HEAD(),'Prefer':'return=minimal'},body:JSON.stringify({note:note.trim()||null})});
    if(r.ok)await loadItems();
    else alert('Chyba pri ukladaní: '+r.status);
  }catch(e){alert('Chyba siete: '+e.message);}
}

async function delCard(id){
  if(!confirm('Zmazať tento zápisok?'))return;
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${TBL}?id=eq.${id}`,{method:'DELETE',headers:SB_HEAD()});
    if(r.ok)await loadItems();
  }catch(e){alert('Chyba siete: '+e.message);}
}

document.querySelectorAll('textarea').forEach(ta=>{
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey){const col=ta.id.replace('inp-','');addCard(col);}});
});

loadItems();
</script>
</body>
</html>
