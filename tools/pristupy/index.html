<!doctype html><html lang="sk"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Prístupy – povolení používatelia</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;background:#f0f2f5;color:#1a1a2e}
.wrap{max-width:720px;margin:0 auto;padding:20px 16px}
h1{font-size:20px;margin:6px 0 2px}
.sub{font-size:12.5px;color:#6b7280;margin-bottom:18px;line-height:1.5}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:16px}
.addf{display:flex;gap:8px;flex-wrap:wrap}
.addf input{flex:1;min-width:160px;padding:10px 12px;border:1.5px solid #dde1ea;border-radius:8px;font-size:14px;font-family:inherit}
.addf button{padding:10px 18px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;background:#1a2745;color:#fff;padding:8px 10px;font-size:12px}
td{padding:8px 10px;border-bottom:1px solid #eef0f5;vertical-align:middle}
tr:hover td{background:#f7faff}
.del{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:600}
.del:hover{background:#fca5a5}
.me{font-size:11px;color:#16a34a;font-weight:700}
.msg{font-size:13px;min-height:18px;margin-top:8px}
.warn{background:#fef3c7;border:1px solid #fde68a;color:#92400e;border-radius:8px;padding:12px;font-size:13px}
.err{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;border-radius:8px;padding:12px;font-size:13px}
</style>
</head>
<body>
<script src="/tools/auth.js"></script>
<script>checkAuth();</script>
<div class="wrap">
  <h1>🔑 Prístupy – povolení používatelia</h1>
  <div class="sub">Do aplikácie sa dostanú iba emaily z tohto zoznamu (aj pri prihlásení cez Google). Kto tu nie je, prihlási sa, ale nič neuvidí. Spravovať môžu len poverení administrátori.</div>
  <div id="content"></div>
</div>

<script>
const SB_URL='https://ncqtiicfqhaturjlfxcj.supabase.co';
const SB_ANON='sb_publishable_DX_FaXYGNx70dB6m-PfhAA_H5NHyH3k';
const H=()=>({'apikey':SB_ANON,'Authorization':'Bearer '+sbToken(),'Content-Type':'application/json'});
const TBL='povoleni_pouzivatelia';
const ADMINS=['vincze.lukas@gmail.com','oira@cievny.sk'];
const ME=(window.sbUserEmail?sbUserEmail():'').toLowerCase();
function escHtml(t){return (t==null?'':''+t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
// efektívny admin: stĺpec `admin` v DB; ak ešte neexistuje (pred spustením SQL), fallback na pevný zoznam
function isAdm(u){return u.admin===true || (u.admin===undefined && ADMINS.includes((u.email||'').toLowerCase()));}

async function load(){
  const c=document.getElementById('content');
  let rows;
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${TBL}?order=email.asc&limit=1000`,{headers:H()});
    if(!r.ok){throw new Error(r.status);}
    rows=await r.json();
  }catch(e){
    c.innerHTML='<div class="err">Tabuľka <code>povoleni_pouzivatelia</code> nie je dostupná (spustite SQL <code>spustit_na_konci.sql</code>). Chyba: '+escHtml(e.message)+'</div>';return;
  }
  const meRow=rows.find(u=>(u.email||'').toLowerCase()===ME);
  const meAdmin = meRow ? isAdm(meRow) : ADMINS.includes(ME);
  if(!meAdmin){c.innerHTML='<div class="warn">Túto stránku môžu používať len administrátori. Vy ste prihlásený ako <b>'+escHtml(ME||'—')+'</b>. O pridanie medzi adminov požiadajte existujúceho administrátora.</div>';return;}
  const adminCount=rows.filter(isAdm).length;
  c.innerHTML=`
    <div class="card">
      <div class="addf">
        <input id="a_email" type="email" placeholder="email@…" onkeydown="if(event.key==='Enter')pridaj()">
        <input id="a_meno" placeholder="meno (nepovinné)">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#374151"><input type="checkbox" id="a_admin"> admin</label>
        <button onclick="pridaj()">＋ Pridať</button>
      </div>
      <div class="msg" id="msg"></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table>
        <thead><tr><th>Email</th><th>Meno</th><th>Rola</th><th>Pridal</th><th></th></tr></thead>
        <tbody>${rows.map(u=>{const self=(u.email||'').toLowerCase()===ME;const adm=isAdm(u);return `<tr>
          <td>${escHtml(u.email)} ${self?'<span class="me">(vy)</span>':''}</td>
          <td>${escHtml(u.meno||'')}</td>
          <td>${adm?'<span class="badge-adm">👑 admin</span>':'<span style="color:#94a3b8;font-size:12px">používateľ</span>'}
            ${self?'':`<button class="admtog" data-email="${escHtml(u.email)}" data-to="${adm?'0':'1'}">${adm?'zrušiť admina':'spraviť adminom'}</button>`}</td>
          <td style="color:#94a3b8;font-size:12px">${escHtml((u.pridal||'').split('@')[0])}</td>
          <td style="text-align:right">${self?'':`<button class="del" data-email="${escHtml(u.email)}">✕ odobrať</button>`}</td>
        </tr>`;}).join('')||'<tr><td colspan="5" style="color:#94a3b8;padding:14px">Zoznam je prázdny.</td></tr>'}</tbody>
      </table>
    </div>
    <div class="sub">Povolených: <b>${rows.length}</b> · administrátorov: <b>${adminCount}</b>. Seba nemôžete odobrať ani si zrušiť admina (poistka proti zamknutiu sa von).</div>`;
  c.querySelectorAll('button.del').forEach(b=>b.addEventListener('click',()=>odober(b.dataset.email)));
  c.querySelectorAll('button.admtog').forEach(b=>b.addEventListener('click',()=>setAdmin(b.dataset.email,b.dataset.to==='1')));
}
function msg(t,c){const m=document.getElementById('msg');if(m){m.textContent=t;m.style.color=c||'#16a34a';}}

async function pridaj(){
  const email=(document.getElementById('a_email').value||'').trim().toLowerCase();
  const meno=(document.getElementById('a_meno').value||'').trim();
  const admin=document.getElementById('a_admin').checked;
  if(!email||email.indexOf('@')<0){msg('Zadajte platný email.','#b45309');return;}
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${TBL}`,{method:'POST',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify({email,meno:meno||null,admin})});
    if(r.ok){msg('✓ Pridané: '+email+(admin?' (admin)':''));await load();}
    else if(r.status===409){msg('Tento email už na zozname je.','#b45309');}
    else msg('❌ Chyba: '+r.status+(r.status===403?' – nemáte oprávnenie':''),'#dc2626');
  }catch(e){msg('❌ Chyba siete','#dc2626');}
}
async function setAdmin(email,makeAdmin){
  if(!confirm((makeAdmin?'Spraviť adminom: ':'Zrušiť admina: ')+email+'?'))return;
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${TBL}?email=eq.${encodeURIComponent(email)}`,{method:'PATCH',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify({admin:makeAdmin})});
    if(r.ok)await load();
    else msg('❌ Chyba: '+r.status+(r.status===400?' – spustite SQL (chýba stĺpec admin)':(r.status===403?' – nemáte oprávnenie':'')),'#dc2626');
  }catch(e){msg('❌ Chyba siete','#dc2626');}
}
async function odober(email){
  if(!confirm('Odobrať prístup pre '+email+'?'))return;
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${TBL}?email=eq.${encodeURIComponent(email)}`,{method:'DELETE',headers:H()});
    if(r.ok)await load();
    else alert('Chyba pri odoberaní: '+r.status);
  }catch(e){alert('Chyba siete');}
}
load();
</script>
</body></html>
