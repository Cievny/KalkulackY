<!doctype html><html lang="sk"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Objednávky CEUS / CT</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;background:#f0f2f5;color:#1a1a2e}
.wrap{max-width:1100px;margin:0 auto;padding:16px}
h1{font-size:20px;margin:6px 0 2px}
.sub{font-size:12.5px;color:#6b7280;margin-bottom:14px}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{padding:9px 22px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;background:#e5e7eb;color:#374151}
.tab.active{background:#1e40af;color:#fff}
.tab.ct.active{background:#7c3aed}
.bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.bar button{padding:7px 14px;border:1px solid #cbd5e1;background:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#1a2745}
.bar button:hover{background:#f1f5f9}
.bar .mlabel{font-size:16px;font-weight:700;min-width:170px;text-align:center}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.dh{font-size:11px;font-weight:700;color:#64748b;text-align:center;padding:4px 0;text-transform:uppercase}
.day{background:#fff;border:1px solid #e5e7eb;border-radius:10px;min-height:92px;padding:7px 8px;position:relative;display:flex;flex-direction:column;gap:4px}
.day.other{background:#f8fafc;color:#cbd5e1}
.day.today{outline:2px solid #3b82f6;outline-offset:-2px}
.day.open{cursor:pointer}
.day.open:hover{box-shadow:0 3px 10px rgba(0,0,0,.1)}
.day.closed{background:#f8fafc}
.dnum{font-size:13px;font-weight:700}
.day.sel{outline:2px solid #16a34a;outline-offset:-2px}
.cap{font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block;align-self:flex-start}
.cap.ok{background:#dcfce7;color:#166534}
.cap.full{background:#fee2e2;color:#991b1b}
.mini{font-size:11px;color:#475569;line-height:1.3;overflow:hidden}
.adm{display:flex;gap:4px;margin-top:auto;flex-wrap:wrap}
.adm button{font-size:10.5px;padding:2px 6px;border-radius:6px;border:1px solid #cbd5e1;background:#fff;cursor:pointer;color:#334155}
.adm button.open-b{border-color:#16a34a;color:#166534}
.adm button.close-b{border-color:#dc2626;color:#991b1b}
.closedlabel{font-size:10.5px;color:#94a3b8}
.panel{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-top:16px}
.panel h2{font-size:16px;margin:0 0 10px}
.brow{display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid #eef0f5;font-size:13px}
.brow .bnum{width:22px;color:#64748b;font-weight:700}
.brow .bmain{flex:1}
.brow .bmeta{color:#64748b;font-size:12px}
.brow button{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid #fca5a5;background:#fee2e2;color:#991b1b;cursor:pointer}
.form{display:grid;grid-template-columns:1.3fr .5fr .9fr 1.2fr;gap:8px;margin-top:12px}
.form input{padding:9px 10px;border:1.5px solid #dde1ea;border-radius:8px;font-size:13px;font-family:inherit}
.form .full{grid-column:1/-1}
.addbtn{grid-column:1/-1;padding:11px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.addbtn:disabled{background:#cbd5e1;cursor:not-allowed}
.msg{font-size:13px;margin-top:8px;min-height:18px}
.empty{color:#94a3b8;font-size:13px;padding:10px 0}
.legend{font-size:11.5px;color:#6b7280;margin-top:10px}
@media(max-width:700px){.form{grid-template-columns:1fr 1fr}.day{min-height:74px}.bar .mlabel{min-width:120px;font-size:14px}}
</style>
</head>
<body>
<script src="/tools/auth.js"></script>
<script>checkAuth();</script>
<div class="wrap">
  <h1>🩻 Objednávky CEUS / CT</h1>
  <div class="sub">Objednáva sa iba na <b>odblokované dni</b>. Otvárať dni môžu poverení lekári; ostatní zapisujú pacientov na voľné miesta.</div>

  <div class="tabs">
    <button class="tab active" id="tab_ceus" onclick="switchTyp('ceus')">CEUS</button>
    <button class="tab ct" id="tab_ct" onclick="switchTyp('ct')">CT</button>
  </div>

  <div class="bar">
    <button onclick="shiftMonth(-1)">◀</button>
    <span class="mlabel" id="mlabel"></span>
    <button onclick="shiftMonth(1)">▶</button>
    <button onclick="goToday()">Dnes</button>
    <span id="adminhint" style="font-size:12px;color:#16a34a;font-weight:600"></span>
  </div>

  <div class="cal" id="cal"></div>
  <div class="legend" id="legend"></div>

  <div class="panel" id="panel" style="display:none">
    <h2 id="panel_title"></h2>
    <div id="booklist"></div>
    <div id="formwrap"></div>
    <div class="msg" id="pmsg"></div>
  </div>
</div>

<script>
const SB_URL='https://ncqtiicfqhaturjlfxcj.supabase.co';
const SB_ANON='sb_publishable_DX_FaXYGNx70dB6m-PfhAA_H5NHyH3k';
const H=()=>({'apikey':SB_ANON,'Authorization':'Bearer '+sbToken(),'Content-Type':'application/json'});
const T_DNI='objednavky_dni', T_OBJ='objednavky';
const ADMINS=['vincze.lukas@gmail.com','oira@cievny.sk'];
function isAdmin(){const e=(window.sbUserEmail?sbUserEmail():'').toLowerCase();return ADMINS.includes(e);}
function escHtml(t){return (t==null?'':''+t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function isoLocal(d){const z=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
function parseISO(s){const p=(''+s).split('-');return new Date(+p[0],(+p[1]||1)-1,+p[2]||1);}
function fmtD(d){const x=parseISO(d);return x.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}

let TYP='ceus';
let CUR=new Date();CUR.setDate(1);
let DNI={};   // 'YYYY-MM-DD' -> {id,kapacita,updated_at}
let OBJ=[];   // objednávky v zobrazenom mesiaci
let SEL=null; // vybraný deň

const MES=['Január','Február','Marec','Apríl','Máj','Jún','Júl','August','September','Október','November','December'];

function switchTyp(t){
  TYP=t;SEL=null;
  document.getElementById('tab_ceus').classList.toggle('active',t==='ceus');
  document.getElementById('tab_ct').classList.toggle('active',t==='ct');
  document.getElementById('panel').style.display='none';
  loadMonth();
}
function shiftMonth(dir){CUR.setMonth(CUR.getMonth()+dir);SEL=null;document.getElementById('panel').style.display='none';loadMonth();}
function goToday(){CUR=new Date();CUR.setDate(1);loadMonth();}

async function loadMonth(){
  document.getElementById('adminhint').textContent=isAdmin()?'✓ môžete otvárať/zatvárať dni':'';
  const y=CUR.getFullYear(),m=CUR.getMonth();
  document.getElementById('mlabel').textContent=MES[m]+' '+y;
  const first=isoLocal(new Date(y,m,1)), last=isoLocal(new Date(y,m+1,0));
  DNI={};OBJ=[];
  try{
    const rd=await fetch(`${SB_URL}/rest/v1/${T_DNI}?typ=eq.${TYP}&datum=gte.${first}&datum=lte.${last}&limit=200`,{headers:H()});
    if(rd.ok){(await rd.json()).forEach(r=>{DNI[r.datum]={id:r.id,kapacita:r.kapacita,updated_at:r.updated_at,cas_od:r.cas_od,cas_do:r.cas_do};});}
    else if(rd.status===404||rd.status===400){legendErr();return;}
    const ro=await fetch(`${SB_URL}/rest/v1/${T_OBJ}?typ=eq.${TYP}&datum=gte.${first}&datum=lte.${last}&stav=neq.zruseny&order=created_at.asc&limit=1000`,{headers:H()});
    if(ro.ok)OBJ=await ro.json();
  }catch(e){legendErr();return;}
  renderCal();
  if(SEL)renderPanel();
}
function legendErr(){
  document.getElementById('cal').innerHTML='';
  document.getElementById('legend').innerHTML='⚠️ Tabuľky <code>objednavky_dni</code> / <code>objednavky</code> nie sú v Supabase. Spustite priložený SQL (objednavky.sql).';
}
function countFor(dk){return OBJ.filter(o=>o.datum===dk).length;}
// generuj časové sloty po 15 min z "HH:MM"–"HH:MM" (posledný slot = do−15)
function genSlots(od,doo){
  const p=s=>{const m=(''+s).match(/^(\d{1,2}):(\d{2})$/);return m?(+m[1])*60+(+m[2]):null;};
  let a=p(od),b=p(doo);if(a==null||b==null||b<=a)return[];
  const out=[];for(let t=a;t<b;t+=15){out.push(String((t/60|0)).padStart(2,'0')+':'+String(t%60).padStart(2,'0'));}
  return out;
}
function daySlots(dk){const d=DNI[dk];return (d&&d.cas_od&&d.cas_do)?genSlots(d.cas_od,d.cas_do):null;}

function renderCal(){
  const y=CUR.getFullYear(),m=CUR.getMonth();
  const box=document.getElementById('cal');box.innerHTML='';
  ['Po','Ut','St','Št','Pi','So','Ne'].forEach(d=>{const h=document.createElement('div');h.className='dh';h.textContent=d;box.appendChild(h);});
  const first=new Date(y,m,1), last=new Date(y,m+1,0);
  const cur=new Date(y,m,1);cur.setDate(1-((first.getDay()+6)%7));
  const today=isoLocal(new Date());
  const adm=isAdmin();
  while(true){
    const dk=isoLocal(cur), inM=cur.getMonth()===m;
    const open=!!DNI[dk], kap=open?DNI[dk].kapacita:0, cnt=countFor(dk), full=open&&cnt>=kap;
    const cell=document.createElement('div');
    cell.className='day'+(inM?'':' other')+(dk===today?' today':'')+(open&&inM?' open':' closed')+(SEL===dk?' sel':'');
    let html=`<div class="dnum">${cur.getDate()}</div>`;
    if(inM){
      if(open){
        html+=`<span class="cap ${full?'full':'ok'}">${cnt}/${kap}${full?' plné':''}</span>`;
        if(DNI[dk].cas_od&&DNI[dk].cas_do)html+=`<div class="mini" style="color:#64748b;font-weight:600">🕒 ${escHtml(DNI[dk].cas_od)}–${escHtml(DNI[dk].cas_do)}</div>`;
        const names=OBJ.filter(o=>o.datum===dk).slice(0,2).map(o=>escHtml(o.meno||'?')).join(', ');
        if(names)html+=`<div class="mini">${names}${cnt>2?' +'+(cnt-2):''}</div>`;
      }else{
        html+=`<div class="closedlabel">zatvorené</div>`;
      }
      if(adm){
        html+=`<div class="adm">`;
        if(open){
          html+=`<button onclick="event.stopPropagation();upravKap('${dk}')">upraviť</button>`
              +`<button class="close-b" onclick="event.stopPropagation();zavriDen('${dk}')">zavrieť</button>`;
        }else{
          html+=`<button class="open-b" onclick="event.stopPropagation();otvorDen('${dk}')">＋ otvoriť</button>`;
        }
        html+=`</div>`;
      }
    }
    cell.innerHTML=html;
    if(inM&&open)cell.addEventListener('click',()=>selectDay(dk));
    box.appendChild(cell);
    cur.setDate(cur.getDate()+1);
    if(cur>last&&((cur.getDay()+6)%7)===0)break;
  }
  document.getElementById('legend').innerHTML=adm
    ?'Zelené dni sú otvorené. Cez „＋ otvoriť" zadáte buď <b>čas OD-DO</b> (napr. 8:00-12:00 → termíny po 15 min), alebo len <b>počet miest</b>. Klikom na deň zapíšete pacienta na konkrétny termín.'
    :'Objednávať sa dá len na zelené (otvorené) dni – kliknite na deň a vyberte voľný termín. Zatvorené dni otvára poverený lekár.';
}

function selectDay(dk){SEL=dk;renderCal();renderPanel();document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'nearest'});}

function bookMeta(o){
  return `${o.indikacia?'<span class="bmeta"> – '+escHtml(o.indikacia)+'</span>':''}`
    +`${o.oddelenie?'<span class="bmeta"> · '+escHtml(o.oddelenie)+'</span>':''}`
    +`${o.objednal?'<span class="bmeta"> · obj.: '+escHtml((o.objednal||'').split('@')[0])+'</span>':''}`;
}
function renderPanel(){
  const dk=SEL;if(!dk||!DNI[dk]){document.getElementById('panel').style.display='none';return;}
  const d=DNI[dk], kap=d.kapacita, list=OBJ.filter(o=>o.datum===dk), slots=daySlots(dk);
  document.getElementById('panel').style.display='';
  document.getElementById('panel_title').innerHTML=`${TYP.toUpperCase()} – ${escHtml(fmtD(dk))} <span style="font-weight:600;color:#64748b;font-size:13px">(${list.length}/${kap} obsadené${slots?', termíny '+escHtml(d.cas_od)+'–'+escHtml(d.cas_do):''})</span>`;
  const bl=document.getElementById('booklist');
  if(slots){
    const byCas={};list.forEach(o=>{if(o.cas)byCas[normHM(o.cas)]=o;});
    bl.innerHTML=slots.map(t=>{
      const o=byCas[t];
      if(o)return `<div class="brow"><span class="bnum" style="width:44px">${t}</span>
        <span class="bmain"><b>${escHtml(o.meno||'?')}</b>${o.rocnik?' ('+o.rocnik+')':''}${bookMeta(o)}</span>
        <button onclick="zrusObj('${o.id}')">✕ zrušiť</button></div>`;
      return `<div class="brow" style="opacity:.7"><span class="bnum" style="width:44px">${t}</span><span class="bmain" style="color:#94a3b8">voľný termín</span></div>`;
    }).join('');
  }else{
    bl.innerHTML=list.length?list.map((o,i)=>
      `<div class="brow"><span class="bnum">${i+1}.</span>
        <span class="bmain"><b>${escHtml(o.meno||'?')}</b>${o.rocnik?' ('+o.rocnik+')':''}${bookMeta(o)}</span>
        <button onclick="zrusObj('${o.id}')">✕ zrušiť</button></div>`).join(''):'<div class="empty">Zatiaľ žiadne objednávky na tento deň.</div>';
  }
  const fw=document.getElementById('formwrap');
  const freeSlots=slots?slots.filter(t=>!list.some(o=>normHM(o.cas||'')===t)):null;
  const full=slots?(freeSlots.length===0):(list.length>=kap);
  if(full){
    fw.innerHTML=`<div class="empty" style="color:#991b1b;font-weight:600">Deň je plný (${list.length}/${kap}). ${isAdmin()?'Rozsah/kapacitu môžete zmeniť tlačidlom „upraviť" v kalendári.':''}</div>`;
  }else{
    const casSel=slots?`<select id="o_cas" class="full" style="padding:9px 10px;border:1.5px solid #dde1ea;border-radius:8px;font-size:13px">${freeSlots.map(t=>`<option value="${t}">termín ${t}</option>`).join('')}</select>`:'';
    fw.innerHTML=`<div class="form">
      ${casSel}
      <input id="o_meno" placeholder="Meno pacienta" onkeydown="if(event.key==='Enter')pridajObj()">
      <input id="o_rocnik" type="number" placeholder="ročník" min="1900" max="2035">
      <input id="o_rc" placeholder="r.č. (nepovinné)">
      <input id="o_indik" placeholder="indikácia / dôvod">
      <input id="o_odd" class="full" placeholder="oddelenie / odosielajúci (nepovinné)">
      <input id="o_pozn" class="full" placeholder="poznámka (nepovinné)">
      <button class="addbtn" onclick="pridajObj()">＋ Objednať pacienta (${list.length}/${kap})</button>
    </div>`;
  }
  document.getElementById('pmsg').textContent='';
}

function pmsg(t,c){const m=document.getElementById('pmsg');m.textContent=t;m.style.color=c||'#16a34a';}

async function pridajObj(){
  const dk=SEL;if(!dk||!DNI[dk])return;
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  const meno=g('o_meno');
  if(!meno){pmsg('Zadajte meno pacienta.','#b45309');return;}
  const timed=!!daySlots(dk);
  let cas=null;
  if(timed){const cs=document.getElementById('o_cas');cas=cs?cs.value:null;if(!cas){pmsg('Vyberte termín.','#b45309');return;}}
  // čerstvá kontrola (aby sa dvaja neobjednali nad limit / na ten istý termín)
  try{
    if(timed){
      const rc=await fetch(`${SB_URL}/rest/v1/${T_OBJ}?typ=eq.${TYP}&datum=eq.${dk}&cas=eq.${encodeURIComponent(cas)}&stav=neq.zruseny&select=id`,{headers:H()});
      if(rc.ok){const cur=await rc.json();if(cur.length){pmsg('Termín '+cas+' medzitým obsadili – obnovujem.','#b45309');await loadMonth();return;}}
    }else{
      const rc=await fetch(`${SB_URL}/rest/v1/${T_OBJ}?typ=eq.${TYP}&datum=eq.${dk}&stav=neq.zruseny&select=id`,{headers:H()});
      if(rc.ok){const cur=await rc.json();if(cur.length>=DNI[dk].kapacita){pmsg('Medzitým sa deň naplnil – obnovujem.','#b45309');await loadMonth();return;}}
    }
  }catch(e){}
  const body={typ:TYP,datum:dk,meno,cas,
    rocnik:g('o_rocnik')?parseInt(g('o_rocnik')):null,
    rodne_cislo:g('o_rc')||null,indikacia:g('o_indik')||null,
    oddelenie:g('o_odd')||null,poznamka:g('o_pozn')||null,
    objednal:(window.sbUserEmail?sbUserEmail():'')||null,stav:'objednany'};
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${T_OBJ}`,{method:'POST',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify(body)});
    if(r.ok){pmsg('✓ Objednané');await loadMonth();}
    else pmsg('❌ Chyba: '+r.status+(r.status===400?' (spustite objednavky.sql)':''),'#dc2626');
  }catch(e){pmsg('❌ Chyba siete','#dc2626');}
}

async function zrusObj(id){
  if(!confirm('Zrušiť túto objednávku?'))return;
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${T_OBJ}?id=eq.${id}`,{method:'PATCH',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify({stav:'zruseny',updated_at:new Date().toISOString()})});
    if(r.ok)await loadMonth();
  }catch(e){}
}

// ── Admin: otváranie / zatváranie dní ──
function normHM(s){const m=(''+s).match(/^(\d{1,2}):(\d{2})$/);return m?String(+m[1]).padStart(2,'0')+':'+m[2]:s;}
async function otvorDen(dk){
  if(!isAdmin())return;
  const ans=prompt('Otvoriť '+fmtD(dk)+' pre '+TYP.toUpperCase()+'.\n\nZadajte čas OD-DO (termíny po 15 min), napr. 8:00-12:00\nalebo len počet miest bez časov (napr. 6):','8:00-12:00');
  if(ans===null)return;
  const body={typ:TYP,datum:dk};
  const rng=ans.match(/^\s*(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})\s*$/);
  if(rng){
    const slots=genSlots(rng[1],rng[2]);
    if(!slots.length){alert('Neplatný rozsah – čas OD musí byť skôr než DO.');return;}
    body.cas_od=normHM(rng[1]);body.cas_do=normHM(rng[2]);body.kapacita=slots.length;
  }else{
    const n=parseInt(ans);if(!(n>0)){alert('Zadajte čas OD-DO (napr. 8:00-12:00) alebo počet miest.');return;}
    body.kapacita=n;
  }
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${T_DNI}`,{method:'POST',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify(body)});
    if(r.ok)await loadMonth();
    else alert('Chyba pri otváraní: '+r.status+(r.status===409?' – deň je už otvorený':(r.status===400?' (spustite objednavky.sql – doplňte stĺpce cas_od/cas_do)':'')));
  }catch(e){alert('Chyba siete');}
}
async function patchDen(id,fields){
  try{const r=await fetch(`${SB_URL}/rest/v1/${T_DNI}?id=eq.${id}`,{method:'PATCH',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify({...fields,updated_at:new Date().toISOString()})});if(r.ok)await loadMonth();}catch(e){}
}
async function upravKap(dk){
  if(!isAdmin()||!DNI[dk])return;
  const d=DNI[dk], cnt=countFor(dk);
  if(d.cas_od&&d.cas_do){ // časový deň – upravujeme rozsah
    const ans=prompt('Upraviť čas dňa '+fmtD(dk)+' (termíny po 15 min).\nObsadené: '+cnt,d.cas_od+'-'+d.cas_do);
    if(ans===null)return;
    const rng=ans.match(/^\s*(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})\s*$/);
    if(!rng){alert('Zadajte čas v tvare 8:00-12:00.');return;}
    const slots=genSlots(rng[1],rng[2]);
    if(!slots.length){alert('Neplatný rozsah – OD musí byť skôr než DO.');return;}
    const lost=OBJ.filter(o=>o.datum===dk&&o.cas).map(o=>normHM(o.cas)).filter(c=>!slots.includes(c));
    if(lost.length){alert('Nový rozsah by vynechal už objednané termíny: '+[...new Set(lost)].join(', ')+'. Najprv ich zrušte alebo presuňte.');return;}
    await patchDen(d.id,{cas_od:normHM(rng[1]),cas_do:normHM(rng[2]),kapacita:slots.length});
  }else{ // deň bez časov – upravujeme počet miest
    const kap=prompt('Upraviť počet miest pre '+fmtD(dk)+'.\nObsadené: '+cnt,d.kapacita);
    if(kap===null)return;
    const n=parseInt(kap);if(!(n>0)){alert('Zadajte kladné číslo.');return;}
    if(n<cnt){alert('Počet miest ('+n+') nemôže byť menší než počet už objednaných ('+cnt+').');return;}
    await patchDen(d.id,{kapacita:n});
  }
}
async function zavriDen(dk){
  if(!isAdmin()||!DNI[dk])return;
  const cnt=countFor(dk);
  if(cnt>0){alert('Deň má '+cnt+' objednávok – najprv ich presuňte alebo zrušte, potom deň zatvorte.');return;}
  if(!confirm('Zatvoriť '+fmtD(dk)+' pre '+TYP.toUpperCase()+'? (nebude sa dať objednať)'))return;
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${T_DNI}?id=eq.${DNI[dk].id}`,{method:'DELETE',headers:H()});
    if(r.ok){if(SEL===dk){SEL=null;document.getElementById('panel').style.display='none';}await loadMonth();}
  }catch(e){}
}

loadMonth();
setInterval(()=>{if(document.activeElement&&/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName))return;loadMonth();},60000);
</script>
