<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">

<title>CAS – Generátor správ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13.5px;background:#f0f2f5;color:#1a1a2e}
.tabnav{display:flex;background:#1a2745;padding:0 16px;gap:4px;position:sticky;top:38px;z-index:100}
.tnb{padding:10px 18px;background:none;border:none;color:#8fa3c8;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:.15s}
.tnb:hover{color:#fff}.tnb.active{color:#fff;border-bottom-color:#3b82f6}
.wrap{display:grid;grid-template-columns:1fr 400px;min-height:calc(100vh - 80px)}
.left{padding:18px 20px;overflow-y:auto}
.right{background:#fff;border-left:1px solid #d8dce6;padding:18px;position:sticky;top:80px;height:calc(100vh - 80px);display:flex;flex-direction:column;gap:8px}
.card{background:#fff;border-radius:10px;padding:15px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.st{font-size:11px;font-weight:700;color:#5a6a8a;text-transform:uppercase;letter-spacing:.7px;margin-bottom:11px;padding-bottom:6px;border-bottom:2px solid #eef0f5}
.f{margin-bottom:9px}
.f label{display:block;font-size:11.5px;color:#5a6a8a;font-weight:600;margin-bottom:3px}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;padding:6px 9px;border:1.5px solid #dde1ea;border-radius:6px;font-size:13px;color:#222;background:#fff;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#3b82f6}
.row{display:grid;gap:7px;margin-bottom:9px}
.r2{grid-template-columns:1fr 1fr}.r3{grid-template-columns:1fr 1fr 1fr}
.checks{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:3px}
.ck{display:flex;align-items:center;gap:5px;font-size:12.5px;cursor:pointer;user-select:none;padding:2px 0}
.ck input{width:auto;accent-color:#3b82f6;cursor:pointer}
.tog{margin-bottom:7px;border:1.5px solid #eef0f5;border-radius:7px;overflow:hidden}
.thdr{display:flex;align-items:center;gap:9px;padding:8px 11px;background:#f7f8fc;cursor:pointer;font-weight:600;font-size:13px}
.thdr input{width:auto;accent-color:#3b82f6}.thdr:hover{background:#eef3fc}
.tbody{padding:12px;display:none;border-top:1.5px solid #eef0f5}.tbody.on{display:block}
#out{flex:1;width:100%;border:1.5px solid #dde1ea;border-radius:7px;padding:12px;font-size:12px;line-height:1.65;resize:none;font-family:'Courier New',monospace;color:#1a1a2e;background:#fafbfd}
.btns{display:flex;gap:8px}
.btn{padding:8px 14px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:5px;flex:1;justify-content:center}
.bc{background:#1d6f42;color:#fff}.bc:hover{background:#155e38}
.bp{background:#1e40af;color:#fff}.bp:hover{background:#1737a0}
#cmsg{font-size:11px;text-align:center;min-height:16px}
.id-row{display:grid;grid-template-columns:auto 1fr;gap:5px;align-items:center}
.id-prefix{font-weight:700;font-size:13px;color:#3b82f6;background:#f0f7ff;border:1.5px solid #3b82f6;border-radius:6px;padding:6px 10px;white-space:nowrap}
@media print{.tabnav,.shared-nav{display:none}.left{display:none}.right{border:none;height:auto;position:static}.btns{display:none}#out{border:none;font-family:inherit;font-size:13px;background:#fff}}
</style>
</head>

<script>
const SB_URL='https://ncqtiicfqhaturjlfxcj.supabase.co';
const SB_KEY='sb_publishable_DX_FaXYGNx70dB6m-PfhAA_H5NHyH3k';

function g(id){const el=document.getElementById(id);if(!el)return'';return el.value||'';}
function chk(id){const el=document.getElementById(id);return el?el.checked:false;}
function tB(id){const b=document.getElementById('b_'+id);if(b)b.classList.toggle('on');}
function tShow(id,show){const el=document.getElementById(id);if(el)el.style.display=show?'':'none';}
function msg(t,c){const el=document.getElementById('cmsg');el.style.color=c;el.textContent=t;setTimeout(()=>el.textContent='',3000);}

function updateIdPrefix(){document.getElementById('id-prefix').textContent='CAS-'+new Date().getFullYear()+'-';}

function parseRC(rc){
  if(!rc)return null;
  const s=rc.replace(/\D/g,'');
  if(s.length<9||s.length>10)return null;
  let yr=parseInt(s.slice(0,2)),mo=parseInt(s.slice(2,4)),dy=parseInt(s.slice(4,6));
  let gender='Muž';
  if(mo>50){gender='Žena';mo-=50;}
  const cy=new Date().getFullYear();
  const fullYr=s.length===9?1900+yr:(yr>(cy%100)?1900+yr:2000+yr);
  const bd=new Date(fullYr,mo-1,dy);
  if(isNaN(bd.getTime())||bd>new Date())return null;
  let age=cy-bd.getFullYear();
  const m=new Date().getMonth()-bd.getMonth();
  if(m<0||(m===0&&new Date().getDate()<bd.getDate()))age--;
  return{age,gender};
}

function updateRC(){
  const p=parseRC(g('rodne_cislo'));
  document.getElementById('vek_display').textContent=p?p.age:'–';
  document.getElementById('pohlavie_display').textContent=p?p.gender:'–';
  gen();
}

function gen(){
  const vek=document.getElementById('vek_display').textContent;
  const pohlavie=document.getElementById('pohlavie_display').textContent;
  const jeZena=pohlavie==='Žena';
  const vekText=(vek&&vek!=='–')?(vek+' '+(jeZena?'ročná':'ročný')):'';
  const pacientText=jeZena?'pacientka':'pacient';
  const indText=jeZena?'indikovaná':'indikovaný';
  const lok=g('lokalizacia');
  const strana=lok.includes('dx.')?'l.dx.':'l.sin.';
  const aci='ACI '+strana,acc='ACC '+strana,ace='ACE '+strana;
  const plat=document.getElementById('plat').options[document.getElementById('plat').selectedIndex].text;
  const anestezia=g('anestezia_typ');
  const sheathUv=g('sheath_uvodny');
  const katDiag=g('kateter_diag');
  const pristup=g('pristup_strana');
  const tepna=g('pristup_tepna');

  const uvod=`${vekText} ${pacientText} so symptomatickou kritickou stenózou ${aci} s ${plat} ${indText} k EVL:`.replace(/\s+/g,' ').trim();

  let popisStenozy;
  if(g('stenoza_typ_popisu')==='kriticka'){
    popisStenozy=`na ktorej verifikujeme kritickú odstupovú stenózu ${aci}`;
  } else {
    popisStenozy=`na ktorej sa zobrazuje ${g('stenoza_percenta')}% ${g('stenoza_zavaznost')} stenóza ${aci}`;
  }

  const postup=g('postup_vykonu');
  let priebeh=`${pristup} po ${anestezia}, Seldingerovou technikou, retrográdne pungujeme ${tepna}, zavádzame ${sheathUv} sheath a pomocou ${katDiag} katétra katetrizujeme ${acc} a ďalej diagnostická angiografia, ${popisStenozy}`;

  const parts=[uvod];
  if(postup==='intervencia'){
    priebeh+=` a pristupujeme k intervencii:`;
    parts.push(priebeh);
    const shInterv=`${g('sheath_intervencny_fr')} ${g('sheath_intervencny_dlzka')} (${g('sheath_intervencny_znacka')})`;
    const vodic=`${g('vodic_intervencny_spec')} (${g('vodic_intervencny_brand')})`;
    const embolo=g('emboloprotekcia');
    const stent=g('stent_velkost')?`${g('stent_velkost')} (${g('stent_znacka')})`:g('stent_znacka');
    let intervParts=[];
    if(chk('vykonat_predilataciu')){
      intervParts.push(`Léziu predilatujeme pomocou PTA balónového katétra ${g('balon_predilatacia_velkost')} (${g('balon_predilatacia_znacka')})`);
    }
    let impl=intervParts.length?'v ďalšom kroku pristupujeme':'V ďalšom kroku pristupujeme';
    impl+=` k implantácii stentu ${stent}`;
    if(chk('vykonat_domodelovanie')){
      impl+=` a k domodelovaniu pomocou PTA balóna ${g('balon_domodelovanie_velkost')} (${g('balon_domodelovanie_znacka')})`;
    }
    intervParts.push(impl);
    parts.push(`Zavádzame Storq vodič do ${ace}, vymieňame sheath za ${shInterv}, pomocou ${vodic} vodiča katetrizujeme ${aci} a zavádzame distálnu emboloprotekciu ${embolo}.\n${intervParts.join(', ')}.\nVýsledný angiografický obraz ${g('vysledok')}.`);
  } else {
    priebeh+=`. Vzhľadom na nález volíme konzervatívny postup.`;
    parts.push(priebeh);
  }

  const uz=g('uzatvaraci_system');
  let uzaverText=uz==='manuálne komprimujeme'?`Miesto vpichu ${uz}`:`Miesto vpichu uzatvárame pomocou ${uz}`;
  if(chk('vykonat_hemostazu'))uzaverText+=`, ${g('hemostaza_text')}`;
  uzaverText+='.';
  parts.push(uzaverText);
  parts.push(`Z: ${g('zaver_vykonu')}`);
  document.getElementById('out').value=parts.join('\n\n');
}

function copyOut(){
  const out=document.getElementById('out');
  out.select();
  try{document.execCommand('copy');msg('Skopírované!','#1d6f42');}
  catch{navigator.clipboard.writeText(out.value).then(()=>msg('Skopírované!','#1d6f42'));}
}

async function saveData(){
  const vek=document.getElementById('vek_display').textContent;
  const pohlavie=document.getElementById('pohlavie_display').textContent;
  const isInterv=g('postup_vykonu')==='intervencia';
  const payload={
    vykon_id:'CAS-'+new Date().getFullYear()+'-'+(g('id_suffix')||'???'),
    operator:g('operator'),
    datum_zaznamu:g('datum_zaznamu')||new Date().toISOString().slice(0,10),
    vek:(vek&&vek!=='–')?parseInt(vek):null,
    pohlavie:pohlavie!=='–'?pohlavie:'',
    lokalizacia:g('lokalizacia'),
    typ_platu:document.getElementById('plat').options[document.getElementById('plat').selectedIndex].text,
    klinicky_stav:g('klinicky_stav'),
    nascet_stenoza:g('nascet_stenoza'),
    nascet_metoda:g('nascet_metoda'),
    anestazia:g('anestezia_typ'),
    strana_pristupu:g('pristup_strana'),
    pungovana_tepna:g('pristup_tepna'),
    uvodny_sheath:g('sheath_uvodny'),
    diag_kateter:g('kateter_diag'),
    popis_stenozy:g('stenoza_typ_popisu'),
    percento_stenozy:g('stenoza_typ_popisu')==='percentualna'?g('stenoza_percenta'):'',
    zavaznost_stenozy:g('stenoza_typ_popisu')==='percentualna'?g('stenoza_zavaznost'):'',
    postup:g('postup_vykonu'),
    interv_sheath:isInterv?`${g('sheath_intervencny_fr')} ${g('sheath_intervencny_dlzka')} (${g('sheath_intervencny_znacka')})`:'',
    interv_sheath_fr:isInterv?g('sheath_intervencny_fr'):'',
    interv_sheath_dlzka:isInterv?g('sheath_intervencny_dlzka'):'',
    interv_sheath_znacka:isInterv?g('sheath_intervencny_znacka'):'',
    interv_vodic:isInterv?`${g('vodic_intervencny_spec')} (${g('vodic_intervencny_brand')})`:'',
    interv_vodic_spec:isInterv?g('vodic_intervencny_spec'):'',
    interv_vodic_znacka:isInterv?g('vodic_intervencny_brand'):'',
    emboloprotekcia:isInterv?g('emboloprotekcia'):'',
    predilatacia_vykonana:isInterv&&chk('vykonat_predilataciu')?'Ano':'Nie',
    predilatacny_balon:isInterv&&chk('vykonat_predilataciu')?`${g('balon_predilatacia_velkost')} (${g('balon_predilatacia_znacka')})`:'',
    predilatacny_balon_velkost:isInterv&&chk('vykonat_predilataciu')?g('balon_predilatacia_velkost'):'',
    predilatacny_balon_znacka:isInterv&&chk('vykonat_predilataciu')?g('balon_predilatacia_znacka'):'',
    stent:isInterv?`${g('stent_velkost')} (${g('stent_znacka')})`:'',
    stent_velkost:isInterv?g('stent_velkost'):'',
    stent_znacka:isInterv?g('stent_znacka'):'',
    domodelovanie_vykonane:isInterv&&chk('vykonat_domodelovanie')?'Ano':'Nie',
    domodelovaci_balon:isInterv&&chk('vykonat_domodelovanie')?`${g('balon_domodelovanie_velkost')} (${g('balon_domodelovanie_znacka')})`:'',
    domodelovaci_balon_velkost:isInterv&&chk('vykonat_domodelovanie')?g('balon_domodelovanie_velkost'):'',
    domodelovaci_balon_znacka:isInterv&&chk('vykonat_domodelovanie')?g('balon_domodelovanie_znacka'):'',
    uzatvaraci_system:g('uzatvaraci_system'),
    hemostaza_poznamka:chk('vykonat_hemostazu')?'Ano':'Nie',
    hemostaza_text:chk('vykonat_hemostazu')?g('hemostaza_text'):'',
    vysledok:isInterv?g('vysledok'):'',
    zaver:g('zaver_vykonu')
  };
  msg('Ukladám...','#5a6a8a');
  try{
    const r=await fetch(SB_URL+'/rest/v1/cas_vykony',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=minimal'},
      body:JSON.stringify(payload)
    });
    if(r.ok)msg('Uložené ✓','#1d6f42');
    else{const e=await r.json();msg('Chyba: '+(e.message||r.status),'#dc2626');}
  }catch(e){msg('Chyba siete: '+e.message,'#dc2626');}
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('datum_zaznamu').value=new Date().toISOString().slice(0,10);
  updateIdPrefix();
  updateRC();
});
</script>
