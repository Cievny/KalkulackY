name: Smoke testy

on:
  push:
    branches: ['main', 'claude/**']
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Nainštaluj Playwright + Chromium
        run: |
          npm init -y > /dev/null
          npm i playwright --no-save > /dev/null
          npx playwright install --with-deps chromium
      - name: Spusti smoke testy
        run: node tests/smoke.mjs
      - name: Korpusove testy parsera anamnezy
        run: node tests/parser-korpus.mjs
      - name: Testy follow-up parsera
        run: node tests/parser-fu.mjs
      - name: Testy importu programu
        run: node tests/program-import.mjs
      - name: Testy extraktora poziadaviek
        run: node tests/poziadavky-import.mjs
      - name: Testy scrubbera osobnych udajov
        run: node tests/scrub.mjs
      - name: Testy staging algoritmov (TASC/GLASS/WIfI)
        run: node tests/staging.mjs
      - name: Testy materialoveho registra
        run: node tests/material-katalog.mjs
