name: Týždenná záloha databázy

on:
  schedule:
    - cron: '0 3 * * 1'   # každý pondelok 03:00 UTC
  workflow_dispatch:        # + možnosť spustiť ručne v záložke Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Stiahni všetky tabuľky zo Supabase
        env:
          SB_URL: https://ncqtiicfqhaturjlfxcj.supabase.co
          SB_ANON: sb_publishable_DX_FaXYGNx70dB6m-PfhAA_H5NHyH3k
          SB_EMAIL: ${{ secrets.SUPABASE_BACKUP_EMAIL }}
          SB_PASSWORD: ${{ secrets.SUPABASE_BACKUP_PASSWORD }}
        run: |
          set -e
          # Prihlásenie -> JWT (RLS vyžaduje authenticated rolu)
          TOKEN=$(curl -sf "$SB_URL/auth/v1/token?grant_type=password" \
            -H "apikey: $SB_ANON" -H "Content-Type: application/json" \
            -d "{\"email\":\"$SB_EMAIL\",\"password\":\"$SB_PASSWORD\"}" | python3 -c "import sys,json;print(json.load(sys.stdin)['access_token'])")

          mkdir -p backup
          STAMP=$(date +%Y-%m-%d)
          for T in evk_vykony cas_vykony pevar_vykony evk_followup ideas aorta_indikacie aorta_prilohy \
                   cz_evk_vykony cz_cas_vykony cz_pevar_vykony cz_evk_followup cz_ideas; do
            echo "→ $T"
            curl -sf "$SB_URL/rest/v1/$T?order=created_at.asc&limit=10000" \
              -H "apikey: $SB_ANON" -H "Authorization: Bearer $TOKEN" \
              -o "backup/${T}_${STAMP}.json" || echo "[]" > "backup/${T}_${STAMP}.json"
            python3 -c "import json;d=json.load(open('backup/${T}_${STAMP}.json'));print(f'   {len(d)} záznamov')"
          done

      - name: Ulož zálohu ako artefakt (90 dní)
        uses: actions/upload-artifact@v4
        with:
          name: cievny-zaloha-${{ github.run_id }}
          path: backup/
          retention-days: 90
