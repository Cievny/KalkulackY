name: Denná záloha databázy (2x denne)

on:
  schedule:
    - cron: '7 4 * * *'    # ~6:07 SELČ (4:07 UTC) – ráno
    - cron: '7 14 * * *'   # ~16:07 SELČ (14:07 UTC) – poobede
  workflow_dispatch:        # + možnosť spustiť ručne v záložke Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Stiahni všetky tabuľky zo Supabase
        env:
          SB_URL: https://ncqtiicfqhaturjlfxcj.supabase.co
          SB_ANON: sb_publishable_DX_FaXYGNx70dB6m-PfhAA_H5NHyH3k
          SB_EMAIL: ${{ secrets.SUPABASE_BACKUP_EMAIL }}
          SB_PASSWORD: ${{ secrets.SUPABASE_BACKUP_PASSWORD }}
        run: |
          set -euo pipefail
          # Prihlásenie -> JWT (RLS vyžaduje authenticated rolu). JSON staviame cez python, nie shell-interpoláciou.
          export TOKEN=$(python3 -c "import os,json,urllib.request; \
            d=json.dumps({'email':os.environ['SB_EMAIL'],'password':os.environ['SB_PASSWORD']}).encode(); \
            req=urllib.request.Request(os.environ['SB_URL']+'/auth/v1/token?grant_type=password',data=d, \
              headers={'apikey':os.environ['SB_ANON'],'Content-Type':'application/json'}); \
            print(json.load(urllib.request.urlopen(req))['access_token'])")
          if [ -z "$TOKEN" ]; then echo '::error::Prihlásenie do Supabase zlyhalo (skontrolujte secrets)'; exit 1; fi

          mkdir -p backup
          export STAMP=$(date +%Y-%m-%d)
          # Jeden Python blok: tabuľky so stránkovaním + oba storage buckety. TOKEN ide cez os.environ (nie interpolácia do zdroja).
          python3 - <<'PYEOF'
          import json,os,sys,urllib.request,urllib.parse
          SB_URL=os.environ['SB_URL'];SB_ANON=os.environ['SB_ANON'];TOKEN=os.environ['TOKEN'];STAMP=os.environ['STAMP']
          def api(path,raw=False):
              req=urllib.request.Request(SB_URL+path,
                  headers={'apikey':SB_ANON,'Authorization':'Bearer '+TOKEN})
              with urllib.request.urlopen(req) as r:
                  return r.read() if raw else json.loads(r.read())
          def fetch_all(table, select=None, order='created_at.asc,id.asc'):
              out=[];off=0
              base=[('select='+select) if select else None, 'order='+order, 'limit=1000']
              base=[x for x in base if x]
              while True:
                  chunk=api(f'/rest/v1/{table}?'+'&'.join(base+[f'offset={off}']))
                  out+=chunk
                  if len(chunk)<1000:break
                  off+=1000
              return out

          TABLES=['evk_vykony','cas_vykony','pevar_vykony','evk_followup','pevar_followup','cas_followup',
                  'ideas','aorta_indikacie','aorta_prilohy','denny_program','oznamy','oznam_reakcie',
                  'objednavky_dni','objednavky','povoleni_pouzivatelia','pozvanky','zaujimavi_pacienti','cz_zaujimavi_pacienti','kalendar_udalosti',
                  'cz_evk_vykony','cz_cas_vykony','cz_pevar_vykony','cz_evk_followup','cz_pevar_followup',
                  'cz_cas_followup','cz_ideas','material_pouzitie']
          # tabuľky bez stĺpca id majú vlastné triedenie
          ORDER={'povoleni_pouzivatelia':'email.asc','pozvanky':'created_at.asc','kalendar_udalosti':'zaciatok.asc,id.asc'}
          errors=[]
          import urllib.error
          for t in TABLES:
              try:
                  rows=fetch_all(t, order=ORDER.get(t,'created_at.asc,id.asc'))
                  json.dump(rows,open(f'backup/{t}_{STAMP}.json','w'),ensure_ascii=False)
                  print(f'→ {t}: {len(rows)} záznamov')
              except urllib.error.HTTPError as e:
                  # 404 = tabuľka (ešte) neexistuje – varovanie, ale nezhoď celú zálohu
                  if e.code==404:
                      print(f'::warning::tabuľka {t} neexistuje – preskočená')
                  else:
                      print(f'::error::CHYBA pri tabuľke {t}: HTTP {e.code}');errors.append(t)
              except Exception as e:
                  print(f'::error::CHYBA pri tabuľke {t}: {e}');errors.append(t)

          # Storage: aorta-prilohy (podľa aorta_prilohy.storage_path) + oznamy-prilohy (podľa oznamy.priloha_path)
          bucket_fails=[]   # (bucket, zlyhané, spolu) – súhrn na konci behu
          def backup_bucket(bucket,table,col,folder):
              os.makedirs('backup/'+folder,exist_ok=True);n=0;fail=0;total=0
              try:
                  rows=fetch_all(table, select=col)
              except Exception as e:
                  print(f'::error::{table} nedostupná pre prílohy: {e}');errors.append(bucket);return
              for row in rows:
                  p=row.get(col)
                  if not p:continue
                  total+=1
                  try:
                      data=api('/storage/v1/object/'+bucket+'/'+urllib.parse.quote(p),raw=True)
                      open('backup/'+folder+'/'+p.replace('/','__'),'wb').write(data);n+=1
                  except Exception as e:
                      fail+=1;print(f'::warning::súbor {p} z {bucket}: {e}')
              print(f'→ storage {bucket}: {n} súborov')
              if fail:bucket_fails.append((bucket,fail,total))
          backup_bucket('aorta-prilohy','aorta_prilohy','storage_path','aorta-prilohy-subory')
          backup_bucket('oznamy-prilohy','oznamy','priloha_path','oznamy-prilohy-subory')

          # súhrn zlyhaných súborov zo storage (zámerne nezhadzuje celú zálohu)
          for b,f,tot in bucket_fails:
              print(f'::warning::bucket {b}: {f}/{tot} súborov zlyhalo')

          if errors:
              print('::error::Záloha neúplná – zlyhali: '+', '.join(errors));sys.exit(1)
          PYEOF

      - name: Zašifruj zálohu (GPG AES256) – repo je verejný, artefakt nesmie byť čitateľný
        env:
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${BACKUP_PASSPHRASE:-}" ]; then
            echo '::error::Chýba secret BACKUP_PASSPHRASE – bez neho by záloha ostala nešifrovaná na verejnom repozitári. Prerušené.'
            exit 1
          fi
          STAMP=$(date +%Y-%m-%d)
          tar czf "zaloha-${STAMP}.tar.gz" -C backup .
          gpg --batch --yes --pinentry-mode loopback --passphrase "$BACKUP_PASSPHRASE" \
              --cipher-algo AES256 --symmetric --output "zaloha-${STAMP}.tar.gz.gpg" "zaloha-${STAMP}.tar.gz"
          rm -rf backup "zaloha-${STAMP}.tar.gz"   # ponechaj IBA zašifrovaný súbor (žiadny plaintext do artefaktu)
          mkdir -p backup-enc
          mv "zaloha-${STAMP}.tar.gz.gpg" backup-enc/
          echo "✓ Zašifrované: backup-enc/zaloha-${STAMP}.tar.gz.gpg"

      - name: Ulož zašifrovanú zálohu ako artefakt (30 dní)
        uses: actions/upload-artifact@v4
        with:
          name: cievny-zaloha-${{ github.run_id }}
          path: backup-enc/
          retention-days: 30

      - name: Je prvý deň v mesiaci?
        id: cal
        run: echo "prvy=$([ "$(date +%d)" = "01" ] && echo yes || echo no)" >> "$GITHUB_OUTPUT"

      - name: Mesačná záloha s dlhou retenciou (90 dní)
        if: steps.cal.outputs.prvy == 'yes'
        uses: actions/upload-artifact@v4
        with:
          name: cievny-zaloha-mesacna-${{ github.run_id }}
          path: backup-enc/
          retention-days: 90
