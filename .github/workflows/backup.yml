name: Týždenná záloha databázy

on:
  schedule:
    - cron: '0 3 * * 1'   # každý pondelok 03:00 UTC
  workflow_dispatch:        # + možnosť spustiť ručne v záložke Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Stiahni všetky tabuľky zo Supabase
        env:
          SB_URL: https://ncqtiicfqhaturjlfxcj.supabase.co
          SB_ANON: sb_publishable_DX_FaXYGNx70dB6m-PfhAA_H5NHyH3k
          SB_EMAIL: ${{ secrets.SUPABASE_BACKUP_EMAIL }}
          SB_PASSWORD: ${{ secrets.SUPABASE_BACKUP_PASSWORD }}
        run: |
          set -e
          # Prihlásenie -> JWT (RLS vyžaduje authenticated rolu)
          TOKEN=$(curl -sf "$SB_URL/auth/v1/token?grant_type=password" \
            -H "apikey: $SB_ANON" -H "Content-Type: application/json" \
            -d "{\"email\":\"$SB_EMAIL\",\"password\":\"$SB_PASSWORD\"}" | python3 -c "import sys,json;print(json.load(sys.stdin)['access_token'])")

          mkdir -p backup
          STAMP=$(date +%Y-%m-%d)
          for T in evk_vykony cas_vykony pevar_vykony evk_followup pevar_followup cas_followup ideas aorta_indikacie aorta_prilohy denny_program oznamy \
                   cz_evk_vykony cz_cas_vykony cz_pevar_vykony cz_evk_followup cz_pevar_followup cz_cas_followup cz_ideas; do
            echo "→ $T"
            curl -sf "$SB_URL/rest/v1/$T?order=created_at.asc&limit=10000" \
              -H "apikey: $SB_ANON" -H "Authorization: Bearer $TOKEN" \
              -o "backup/${T}_${STAMP}.json" || echo "[]" > "backup/${T}_${STAMP}.json"
            python3 -c "import json;d=json.load(open('backup/${T}_${STAMP}.json'));print(f'   {len(d)} záznamov')"
          done

          # Súborové prílohy zo Storage bucketu aorta-prilohy (fotky, dokumenty)
          echo "→ Storage: aorta-prilohy"
          mkdir -p backup/aorta-prilohy-subory
          python3 - <<PYEOF
          import json,os,urllib.request,urllib.parse

          SB_URL=os.environ['SB_URL'];SB_ANON=os.environ['SB_ANON'];TOKEN="""$TOKEN"""
          def api(path,data=None,raw=False):
              req=urllib.request.Request(SB_URL+path,
                  data=json.dumps(data).encode() if data is not None else None,
                  headers={'apikey':SB_ANON,'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'})
              with urllib.request.urlopen(req) as r:
                  return r.read() if raw else json.loads(r.read())

          # cesty súborov vezmeme z tabuľky príloh (obsahuje storage_path)
          try:
              rows=api('/rest/v1/aorta_prilohy?select=storage_path&typ=eq.subor&limit=10000')
          except Exception as e:
              print('   tabuľka aorta_prilohy nedostupná:',e);rows=[]
          n=0
          for row in rows:
              p=row.get('storage_path')
              if not p:continue
              try:
                  data=api('/storage/v1/object/aorta-prilohy/'+urllib.parse.quote(p),raw=True)
                  dest='backup/aorta-prilohy-subory/'+p.replace('/','__')
                  open(dest,'wb').write(data);n+=1
              except Exception as e:
                  print('   CHYBA pri',p,':',e)
          print(f'   {n} súborov stiahnutých')
          PYEOF

      - name: Ulož zálohu ako artefakt (90 dní)
        uses: actions/upload-artifact@v4
        with:
          name: cievny-zaloha-${{ github.run_id }}
          path: backup/
          retention-days: 90
